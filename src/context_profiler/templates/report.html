/* ════════════════════════════════════════════════════
   PERSISTENCE VIEW (heatmap: content blocks × requests)
   ════════════════════════════════════════════════════ */
const persistenceCanvas = document.getElementById('persistence-canvas');
const persistenceCtx = persistenceCanvas ? persistenceCanvas.getContext('2d') : null;
const persistenceEmpty = document.getElementById('persistence-empty');
const persistenceRows = persistence_blocks || [];
let persistenceHoveredRow = -1;
let persistenceHoveredCol = -1;
let persistenceScrollY = 0;
let persistenceMaxScrollY = 0;

const ROLE_COLORS_P = {
  system: '#9c8ad1',
  user: '#5b9bf5',
  assistant: '#238636',
  tool: '#da6d28',
};

function renderPersistenceView() {
  if (!persistenceCanvas || !persistenceCtx) return;
  const pane = document.getElementById('persistence-pane');
  if (!pane) return;
  const rect = pane.getBoundingClientRect();
  if (rect.width < 10 || rect.height < 10) return;

  persistenceCanvas.width = rect.width * dpr;
  persistenceCanvas.height = rect.height * dpr;
  const W = rect.width;
  const H = rect.height;
  const ctx = persistenceCtx;
  ctx.clearRect(0, 0, persistenceCanvas.width, persistenceCanvas.height);
  ctx.save();
  ctx.scale(dpr, dpr);

  if (!persistenceRows.length || !timeline.length) {
    if (persistenceEmpty) persistenceEmpty.style.display = '';
    ctx.restore();
    return;
  }
  if (persistenceEmpty) persistenceEmpty.style.display = 'none';

  const nReqs = timeline.length;
  const nRows = persistenceRows.length;
  const pad = { top: 70, right: 180, bottom: 30, left: 200 };
  const cellW = Math.max(8, Math.min(28, (W - pad.left - pad.right) / nReqs));
  const cellH = Math.max(16, Math.min(28, (H - pad.top - pad.bottom) / nRows));
  const chartW = cellW * nReqs;
  const chartH = cellH * nRows;
  const barH = 40;

  persistenceMaxScrollY = Math.max(0, (pad.top + barH + 12 + chartH + pad.bottom) - H);
  persistenceScrollY = clamp(persistenceScrollY, 0, persistenceMaxScrollY);
  const offsetY = -persistenceScrollY;

  // Title
  ctx.font = "11px 'IBM Plex Mono', monospace";
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#a0a0a0';
  ctx.fillText('Context Persistence: which content blocks survive across requests', pad.left, 16 + offsetY);

  // Top bar chart: total tokens per request
  const requestTotals = timeline.map(d => d.total_tokens || 0);
  const maxTotal = Math.max(...requestTotals, 1);
  const barTop = 28 + offsetY;
  for (let i = 0; i < nReqs; i++) {
    const x = pad.left + i * cellW;
    const h = (requestTotals[i] / maxTotal) * barH;
    ctx.fillStyle = 'rgba(91, 155, 245, 0.6)';
    ctx.fillRect(x + 1, barTop + barH - h, cellW - 2, h);
  }
  ctx.font = "8px 'IBM Plex Mono', monospace";
  ctx.fillStyle = '#666';
  ctx.textAlign = 'center';
  const tickStep = Math.max(1, Math.floor(nReqs / 16));
  for (let i = 0; i < nReqs; i += tickStep) {
    ctx.fillText(`#${i}`, pad.left + i * cellW + cellW / 2, barTop + barH + 10);
  }

  // Heatmap
  const heatTop = barTop + barH + 18;
  let allTokens = [];
  for (const row of persistenceRows) {
    for (const v of Object.values(row.cells)) {
      if (v > 0) allTokens.push(v);
    }
  }
  allTokens.sort((a, b) => a - b);
  const vMin = allTokens.length ? allTokens[0] : 1;
  const vMax = allTokens.length ? allTokens[allTokens.length - 1] : 1;
  const logMin = Math.log(Math.max(1, vMin));
  const logMax = Math.log(Math.max(2, vMax));

  function cellColor(tokens) {
    if (tokens <= 0) return null;
    const t = (Math.log(tokens) - logMin) / Math.max(0.01, logMax - logMin);
    const clamped = Math.max(0.15, Math.min(1.0, t));
    const r = Math.round(6 + (91 - 6) * (1 - clamped));
    const g = Math.round(6 + (155 - 6) * (1 - clamped));
    const b = Math.round(40 + (245 - 40) * clamped);
    return `rgb(${r},${g},${b})`;
  }

  // Row labels + role strip + cells
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let ri = 0; ri < nRows; ri++) {
    const row = persistenceRows[ri];
    const y = heatTop + ri * cellH + offsetY;
    if (y + cellH < 0 || y > H) continue;

    // Role color strip
    ctx.fillStyle = ROLE_COLORS_P[row.role] || '#666';
    ctx.fillRect(pad.left - 8, y + 2, 4, cellH - 4);

    // Label
    ctx.font = "9px 'IBM Plex Mono', monospace";
    ctx.fillStyle = ri === persistenceHoveredRow ? '#e0e0e0' : '#a0a0a0';
    const label = row.label.length > 24 ? row.label.slice(0, 23) + '…' : row.label;
    ctx.fillText(label, pad.left - 14, y + cellH / 2);

    // Cells
    for (let ci = 0; ci < nReqs; ci++) {
      const reqIdx = timeline[ci].request_index;
      const tokens = row.cells[reqIdx] || 0;
      const x = pad.left + ci * cellW;
      const color = cellColor(tokens);
      if (color) {
        ctx.fillStyle = color;
        ctx.fillRect(x + 1, y + 1, cellW - 2, cellH - 2);
      }
      // Hover highlight
      if (ri === persistenceHoveredRow && ci === persistenceHoveredCol) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x + 0.5, y + 0.5, cellW - 1, cellH - 1);
      }
    }

    // Right annotation
    const chips = [];
    if (row.turns_present >= 2) chips.push(`${row.turns_present}× turns`);
    chips.push(`${(row.total_tokens / 1000).toFixed(1)}K`);
    const isCompactCandidate = row.turns_present >= 3 && row.role !== 'system';
    ctx.textAlign = 'left';
    ctx.font = "8px 'IBM Plex Mono', monospace";
    ctx.fillStyle = isCompactCandidate ? '#e06060' : '#666';
    let annotation = chips.join(' · ');
    if (isCompactCandidate) annotation += '  COMPACT?';
    ctx.fillText(annotation, pad.left + chartW + 10, y + cellH / 2);
    ctx.textAlign = 'right';
  }

  // Hover tooltip
  if (persistenceHoveredRow >= 0 && persistenceHoveredRow < nRows && persistenceHoveredCol >= 0 && persistenceHoveredCol < nReqs) {
    const row = persistenceRows[persistenceHoveredRow];
    const reqIdx = timeline[persistenceHoveredCol].request_index;
    const tokens = row.cells[reqIdx] || 0;
    const tipX = pad.left + persistenceHoveredCol * cellW + cellW + 8;
    const tipY = heatTop + persistenceHoveredRow * cellH + offsetY - 4;
    const tipText = `${row.label} | req #${reqIdx} | ${tokens.toLocaleString()} tokens`;
    ctx.font = "10px 'IBM Plex Mono', monospace";
    const tw = ctx.measureText(tipText).width;
    const tx = Math.min(tipX, W - tw - 20);
    ctx.fillStyle = 'rgba(20,20,20,0.92)';
    ctx.fillRect(tx - 4, tipY - 10, tw + 8, 18);
    ctx.fillStyle = '#e0e0e0';
    ctx.textAlign = 'left';
    ctx.fillText(tipText, tx, tipY);
    ctx.textAlign = 'right';
  }

  ctx.restore();
}

// Persistence View mouse interaction
if (persistenceCanvas) {
  persistenceCanvas.addEventListener('mousemove', (e) => {
    const rect = persistenceCanvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const nReqs = timeline.length;
    const nRows = persistenceRows.length;
    const pad = { top: 70, right: 180, bottom: 30, left: 200 };
    const cellW = Math.max(8, Math.min(28, (rect.width - pad.left - pad.right) / nReqs));
    const cellH = Math.max(16, Math.min(28, (rect.height - pad.top - pad.bottom) / nRows));
    const barH = 40;
    const heatTop = 28 + barH + 18 - persistenceScrollY;

    const col = Math.floor((x - pad.left) / cellW);
    const row = Math.floor((y - heatTop) / cellH);
    const newRow = (row >= 0 && row < nRows && col >= 0 && col < nReqs) ? row : -1;
    const newCol = (col >= 0 && col < nReqs && row >= 0 && row < nRows) ? col : -1;
    if (newRow !== persistenceHoveredRow || newCol !== persistenceHoveredCol) {
      persistenceHoveredRow = newRow;
      persistenceHoveredCol = newCol;
      renderPersistenceView();
    }
  });

  persistenceCanvas.addEventListener('mouseleave', () => {
    persistenceHoveredRow = -1;
    persistenceHoveredCol = -1;
    renderPersistenceView();
  });

  persistenceCanvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    persistenceScrollY = clamp(persistenceScrollY + e.deltaY * 0.5, 0, persistenceMaxScrollY);
    renderPersistenceView();
  }, { passive: false });

  persistenceCanvas.addEventListener('click', (e) => {
    if (persistenceHoveredCol >= 0 && persistenceHoveredCol < timeline.length) {
      switchView('icicle');
      switchToRound(persistenceHoveredCol);
    }
  });
}

/* ════════════════════════════════════════════════════
   SESSION FLOW VIEW (Sankey-like carryover/artifact spans)
   ════════════════════════════════════════════════════ */
const flowCanvas = document.getElementById('flow-canvas');
const flowCtx = flowCanvas ? flowCanvas.getContext('2d') : null;
const flowEmpty = document.getElementById('flow-empty');
const FLOW_MAX_LINKS = 36;
let flowRows = [];
let flowNodes = [];
let flowHoveredLink = null;
let flowHoveredNode = null;
let flowScrollY = 0;
let flowMaxScrollY = 0;

function flowX(requestIndex, pad, chartW) {
  const n = Math.max(1, timeline.length - 1);
  return pad.left + (requestIndex / n) * chartW;
}

function flowLabel(item) {
  if (item.label) return item.label;
  if (item.artifact_key) return item.artifact_key;
  if (item.tool_name) return item.tool_name;
  return item.kind || item.type || 'context';
}

function findIcicleNodeForBlock(blockId) {
  const nodes = icicleHierarchy && icicleHierarchy.nodes || [];
  const direct = nodes.find(n => n.id === blockId || n.block_id === blockId);
  if (direct) return direct;

  const match = /^r\d+:m(\d+):b(\d+)$/.exec(blockId || '');
  if (!match) return null;
  const messageIndex = Number(match[1]);
  const messageNode = nodes.find(n => typeof n.name === 'string' && n.name.startsWith(`[${messageIndex}]`));
  if (!messageNode) return null;

  const contentNode = (messageNode.children || []).find(n => n.name === 'content');
  const toolCallsNode = (messageNode.children || []).find(n => n.name === 'tool_calls');
  return contentNode || toolCallsNode || messageNode;
}

function selectIcicleBlock(requestIndex, blockId) {
  const timelineIdx = timeline.findIndex(d => d.request_index === requestIndex);
  if (timelineIdx < 0) return false;
  switchView('icicle');
  switchToRound(timelineIdx);
  const node = findIcicleNodeForBlock(blockId);
  if (!node) return false;
  zoomToNode(node);
  showDetail(node);
  return true;
}

function selectedPropagationLinks() {
  const links = session_insights && session_insights.propagation && session_insights.propagation.links || [];
  const spawnLinks = links
    .filter(link => link.type === 'spawn')
    .sort((a, b) => (b.value || 0) - (a.value || 0))
    .slice(0, 28);
  const carryLinks = links
    .filter(link => link.type === 'carry')
    .sort((a, b) => (b.value || 0) - (a.value || 0))
    .slice(0, Math.max(0, FLOW_MAX_LINKS - spawnLinks.length));
  return [...spawnLinks, ...carryLinks].slice(0, FLOW_MAX_LINKS);
}

function buildFlowGroups(links) {
  const groups = [];
  const groupBySource = new Map();
  for (const link of links) {
    if (link.type === 'spawn') {
      const existing = groupBySource.get(link.source);
      if (existing) {
        existing.links.push(link);
      } else {
        const group = { source: link.source, type: 'spawn', links: [link] };
        groupBySource.set(link.source, group);
        groups.push(group);
      }
    } else {
      groups.push({ source: `${link.source}:${link.target}`, type: link.type, links: [link] });
    }
  }
  groups.forEach(group => {
    group.links.sort((a, b) => (
      (a.target_request_index - b.target_request_index)
      || ((b.value || 0) - (a.value || 0))
    ));
  });
  return groups;
}

function renderPropagationSankey() {
  if (!flowPane || !flowCanvas) return false;
  const links = selectedPropagationLinks();
  if (!links.length) return false;

  const rect = flowPane.getBoundingClientRect();
  flowCanvas.width = rect.width * dpr;
  flowCanvas.height = rect.height * dpr;
  const W = rect.width;
  const H = rect.height;
  const ctx = flowCtx;
  ctx.clearRect(0, 0, flowCanvas.width, flowCanvas.height);
  ctx.save();
  ctx.scale(dpr, dpr);
  flowRows = [];
  flowNodes = [];
  flowEmpty.style.display = 'none';

  const pad = { top: 52, right: 42, bottom: 42, left: 42 };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;
  const nodeData = session_insights && session_insights.propagation && session_insights.propagation.nodes || [];
  const nodeById = new Map(nodeData.map(node => [node.id, node]));
  const visibleLinks = links.filter(link => nodeById.has(link.source) && nodeById.has(link.target));
  const flowGroups = buildFlowGroups(visibleLinks);
  const groupGap = 24;
  const targetGap = 24;
  const groupHeights = flowGroups.map(group => Math.max(58, group.links.length * targetGap + 20));
  const neededColumnH = groupHeights.reduce((sum, height) => sum + height, 0)
    + Math.max(0, flowGroups.length - 1) * groupGap
    + 80;
  const innerH = Math.max(chartH, neededColumnH);
  flowMaxScrollY = Math.max(0, innerH - chartH);
  flowScrollY = clamp(flowScrollY, 0, flowMaxScrollY);
  const nodeW = 10;
  const maxLinkValue = Math.max(...visibleLinks.map(link => link.value || 1), 1);

  const linkLayout = new Map();
  let groupTop = pad.top + 18 - flowScrollY;
  flowGroups.forEach((group, groupIdx) => {
    const groupHeight = groupHeights[groupIdx];
    const sourceY = groupTop + groupHeight / 2;
    const firstTargetY = groupTop + Math.max(12, (groupHeight - (group.links.length - 1) * targetGap) / 2);
    group.links.forEach((link, linkIdx) => {
      const lineW = Math.max(2, Math.min(18, 2 + ((link.value || 1) / maxLinkValue) * 16));
      const targetY = firstTargetY + linkIdx * targetGap;
      const sourceKey = `source:${group.source}`;
      const targetKey = `target:${group.source}:${link.target}`;
      linkLayout.set(link, { lineW, sourceY, targetY, sourceKey, targetKey });
    });
    groupTop += groupHeight + groupGap;
  });

  const flowNodeByKey = new Map();
  visibleLinks.forEach((link) => {
    const sourceData = nodeById.get(link.source);
    const targetData = nodeById.get(link.target);
    const layout = linkLayout.get(link);
    const makeNode = (data, role, key, laneY, nodeH) => {
      const x = flowX(data.request_index, pad, chartW);
      const isAccum = data.kind === 'accumulation';
      return {
        ...data,
        id: `${key}:${role}`,
        original_id: data.id,
        x0: x - nodeW / 2,
        x1: x + nodeW / 2,
        y0: laneY - nodeH / 2,
        y1: laneY + nodeH / 2,
        laneY,
        link,
        source_id: link.source,
        target_id: link.target,
        block_id: data.block_id,
        request_index: data.request_index,
        kind: isAccum ? 'accumulation' : data.kind,
      };
    };
    if (!flowNodeByKey.has(layout.sourceKey)) {
      const sourceCount = visibleLinks.filter(item => item.source === link.source && item.type === 'spawn').length || 1;
      const sourceH = Math.max(18, Math.min(82, sourceCount * 12 + 10));
      flowNodeByKey.set(layout.sourceKey, makeNode(sourceData, 'source', layout.sourceKey, layout.sourceY, sourceH));
    }
    const targetH = Math.max(18, Math.min(44, layout.lineW * 3.8));
    flowNodeByKey.set(layout.targetKey, makeNode(targetData, 'target', layout.targetKey, layout.targetY, targetH));
  });
  flowNodes = [...flowNodeByKey.values()];

  ctx.font = "11px 'IBM Plex Mono', monospace";
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#a0a0a0';
  ctx.fillText('Repeated Context Flow: exact carry and spawn fan-out across requests', pad.left, 22);

  const tickStep = Math.max(1, Math.floor(timeline.length / 12));
  ctx.font = "9px 'IBM Plex Mono', monospace";
  ctx.fillStyle = '#666';
  ctx.textAlign = 'center';
  for (let i = 0; i < timeline.length; i += tickStep) {
    const req = timeline[i].request_index;
    const x = flowX(req, pad, chartW);
    ctx.strokeStyle = 'rgba(255,255,255,0.055)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, pad.top - 12);
    ctx.lineTo(x, H - pad.bottom + 4);
    ctx.stroke();
    ctx.fillText(`#${req}`, x, H - pad.bottom + 16);
  }

  for (const link of visibleLinks) {
    const layout = linkLayout.get(link);
    const source = flowNodeByKey.get(layout.sourceKey);
    const target = flowNodeByKey.get(layout.targetKey);
    if (!source || !target) continue;
    const lineW = Math.max(2, Math.min(18, 2 + ((link.value || 1) / maxLinkValue) * 16));
    const color = link.type === 'spawn' ? '#d29922' : '#5b9bf5';
    const isHovered = flowHoveredLink && flowHoveredLink.source === link.source && flowHoveredLink.target === link.target;
    const isRelatedToHoveredNode = flowHoveredNode && (flowHoveredNode.original_id === link.source || flowHoveredNode.original_id === link.target);
    const hasHover = !!flowHoveredLink || !!flowHoveredNode;
    const cp = Math.max(36, Math.abs(target.x0 - source.x1) * 0.45);
    const y0 = source.laneY;
    const y1 = target.laneY;
    ctx.strokeStyle = color;
    ctx.lineWidth = isHovered || isRelatedToHoveredNode ? lineW + 2 : lineW;
    ctx.globalAlpha = hasHover
      ? (isHovered || isRelatedToHoveredNode ? 0.92 : 0.12)
      : (link.type === 'spawn' ? 0.72 : 0.56);
    ctx.beginPath();
    ctx.moveTo(source.x1, y0);
    ctx.bezierCurveTo(source.x1 + cp, y0, target.x0 - cp, y1, target.x0, y1);
    ctx.stroke();
    ctx.globalAlpha = 1;
    flowRows.push({
      item: {
        ...link,
        flow_type: link.type,
        first_request_index: link.source_request_index,
        source_block_id: link.source_block_id,
        label: `${link.source_label} → ${link.target_label}`,
      },
      x0: source.x1,
      x1: target.x0,
      y0,
      y1,
      cp,
      lineW,
      y: (y0 + y1) / 2,
      hitY0: Math.min(y0, y1) - Math.max(8, lineW * 1.5),
      hitY1: Math.max(y0, y1) + Math.max(8, lineW * 1.5),
    });
  }

  for (const node of flowNodes) {
    const hasHover = !!flowHoveredLink || !!flowHoveredNode;
    const isRelatedToHoveredLink = flowHoveredLink && (flowHoveredLink.source === node.original_id || flowHoveredLink.target === node.original_id);
    const isHovered = flowHoveredNode && flowHoveredNode.id === node.id;
    const isAccumulation = node.kind === 'accumulation' || node.link.type === 'accumulation';
    const isSpawn = node.link && node.link.type === 'spawn';
    ctx.fillStyle = isAccumulation || isSpawn ? '#d29922' : '#5b9bf5';
    ctx.globalAlpha = hasHover ? (isHovered || isRelatedToHoveredLink ? 1 : 0.22) : 0.85;
    const nodeWidth = node.kind === 'accumulation' ? nodeW + 8 : nodeW;
    const nodeX = node.x0 - (node.kind === 'accumulation' ? 4 : 0);
    ctx.fillRect(nodeX, node.y0, nodeWidth, node.y1 - node.y0);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = 'rgba(255,255,255,0.24)';
    ctx.strokeRect(nodeX + 0.5, node.y0 + 0.5, nodeWidth - 1, node.y1 - node.y0 - 1);

    const label = node.name.length > 26 ? node.name.slice(0, 25) + '…' : node.name;
    ctx.save();
    ctx.translate(node.x0 - 4, node.y0 + 2);
    ctx.rotate(-Math.PI / 2);
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.font = "9px 'IBM Plex Mono', monospace";
    ctx.fillStyle = '#888';
    ctx.fillText(label, 0, 0);
    ctx.restore();
  }

  ctx.textAlign = 'left';
  ctx.font = "9px 'IBM Plex Mono', monospace";
  let lx = pad.left;
  for (const [label, color] of [['Carry', '#5b9bf5'], ['Spawn', '#d29922']]) {
    ctx.fillStyle = color;
    ctx.fillRect(lx, H - 14, 10, 8);
    lx += 14;
    ctx.fillStyle = '#888';
    ctx.fillText(label, lx, H - 10);
    lx += ctx.measureText(label).width + 18;
  }
  if (flowMaxScrollY > 0) {
    const trackH = chartH;
    const thumbH = Math.max(24, chartH * (chartH / innerH));
    const thumbY = pad.top + (flowScrollY / flowMaxScrollY) * (trackH - thumbH);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(W - 10, pad.top, 3, trackH);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(W - 10, thumbY, 3, thumbH);
  }
  ctx.restore();
  return true;
}

function flowNodeHitTest(x, y) {
  return flowNodes.find(node => {
    const extra = node.kind === 'accumulation' ? 8 : 4;
    return x >= node.x0 - extra && x <= node.x1 + extra && y >= node.y0 && y <= node.y1;
  });
}

function distanceToCubicSample(x, y, flow) {
  let best = Infinity;
  const steps = 28;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const mt = 1 - t;
    const px = mt ** 3 * flow.x0
      + 3 * mt ** 2 * t * (flow.x0 + flow.cp)
      + 3 * mt * t ** 2 * (flow.x1 - flow.cp)
      + t ** 3 * flow.x1;
    const py = mt ** 3 * flow.y0
      + 3 * mt ** 2 * t * flow.y0
      + 3 * mt * t ** 2 * flow.y1
      + t ** 3 * flow.y1;
    best = Math.min(best, Math.hypot(px - x, py - y));
  }
  return best;
}

function flowLinkHitTest(x, y) {
  return flowRows.find(flow => (
    x >= Math.min(flow.x0, flow.x1) - 12
    && x <= Math.max(flow.x0, flow.x1) + 12
    && y >= flow.hitY0
    && y <= flow.hitY1
    && distanceToCubicSample(x, y, flow) <= Math.max(8, flow.lineW * 1.4)
  ));
}

function renderFlowTooltip(ev, node, row) {
  if (!node && !row) {
    tooltipEl.style.display = 'none';
    return;
  }
  if (node) {
    tooltipEl.innerHTML = [
      `<div class="tt-name">${escHtml(node.name)}</div>`,
      `<div class="tt-row">Request: <span class="tt-val">#${node.request_index}</span></div>`,
      `<div class="tt-row">Tokens: <span class="tt-val">${fmtK(node.tokens || node.value || 0)}</span></div>`,
      '<div class="tt-row" style="color:#666;font-size:10px;">Click to inspect block</div>',
    ].join('');
  } else {
    const item = row.item;
    const typeLabel = item.flow_type === 'spawn' ? 'spawn fan-out' : (item.flow_type || item.type);
    tooltipEl.innerHTML = [
      `<div class="tt-name">${escHtml(typeLabel)}</div>`,
      `<div class="tt-row">Tokens: <span class="tt-val">${fmtK(item.value || item.carried_tokens || 0)}</span></div>`,
      `<div class="tt-row">Requests: <span class="tt-val">#${item.source_request_index ?? item.first_request_index} → #${item.target_request_index ?? item.last_request_index}</span></div>`,
      item.similarity ? `<div class="tt-row">Similarity: <span class="tt-val">${(item.similarity * 100).toFixed(0)}%</span></div>` : '',
      `<div class="tt-row" style="color:#888">${escHtml(item.label || '')}</div>`,
      '<div class="tt-row" style="color:#666;font-size:10px;">Click to inspect source block</div>',
    ].filter(Boolean).join('');
  }
  tooltipEl.style.display = 'block';
  moveTooltip(ev);
}

function renderFlowView() {
  if (!flowPane || !flowCanvas) return;
  flowEmpty.textContent = 'No session flow data';
  if (renderPropagationSankey()) return;
  const rect = flowPane.getBoundingClientRect();
  flowCanvas.width = rect.width * dpr;
  flowCanvas.height = rect.height * dpr;
  const W = rect.width;
  const H = rect.height;
  const ctx = flowCtx;
  ctx.clearRect(0, 0, flowCanvas.width, flowCanvas.height);
  ctx.save();
  ctx.scale(dpr, dpr);

  const allPropagationLinks = session_insights && session_insights.propagation && session_insights.propagation.links || [];
  const propagationLinks = [
    ...allPropagationLinks.filter(link => link.type === 'carry').slice(0, 8),
    ...allPropagationLinks.filter(link => link.type === 'spawn').slice(0, 6),
  ].sort((a, b) => (b.value || 0) - (a.value || 0));
  const carry = (session_insights && session_insights.carryover_hotspots || []).slice(0, 8);
  const artifacts = (session_insights && session_insights.artifact_lifecycles || []).slice(0, 6);
  const rows = propagationLinks.length
    ? propagationLinks.map(link => ({
      ...link,
      flow_type: link.type,
      first_request_index: link.source_request_index,
      last_request_index: link.target_request_index,
      source_block_id: link.source_block_id,
      label: `${link.source_label} → ${link.target_label}`,
      carried_tokens: link.value,
      carried_request_count: Math.max(1, link.target_request_index - link.source_request_index),
    }))
    : [
      ...carry.map(item => ({...item, flow_type: 'carryover'})),
      ...artifacts.map(item => ({...item, flow_type: 'artifact'})),
    ];
  flowRows = [];
  flowEmpty.style.display = rows.length ? 'none' : 'flex';
  if (!rows.length || timeline.length < 2) {
    ctx.restore();
    return;
  }

  const pad = { top: 42, right: 24, bottom: 40, left: 90 };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;
  const rowGap = Math.max(18, Math.min(34, chartH / Math.max(1, rows.length)));

  ctx.font = "11px 'IBM Plex Mono', monospace";
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#a0a0a0';
  ctx.fillText('Session flow: carry and spawn propagation across requests', pad.left, 18);

  /* Request axis */
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.left, H - pad.bottom);
  ctx.lineTo(W - pad.right, H - pad.bottom);
  ctx.stroke();

  const tickStep = Math.max(1, Math.floor(timeline.length / 12));
  ctx.font = "9px 'IBM Plex Mono', monospace";
  ctx.fillStyle = '#666';
  ctx.textAlign = 'center';
  for (let i = 0; i < timeline.length; i += tickStep) {
    const req = timeline[i].request_index;
    const x = flowX(req, pad, chartW);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath();
    ctx.moveTo(x, pad.top - 6);
    ctx.lineTo(x, H - pad.bottom + 4);
    ctx.stroke();
    ctx.fillText(`#${req}`, x, H - pad.bottom + 16);
  }

  const maxWeight = Math.max(
    ...rows.map(item => item.carried_tokens || item.tokens || item.occurrences || 1),
    1,
  );

  rows.forEach((item, idx) => {
    const y = pad.top + idx * rowGap + rowGap * 0.55;
    const start = item.first_request_index ?? (item.request_indices || [0])[0] ?? 0;
    const end = item.last_request_index ?? (item.request_indices || [start]).slice(-1)[0] ?? start;
    const x0 = flowX(start, pad, chartW);
    const x1 = flowX(end, pad, chartW);
    const weight = item.carried_tokens || item.tokens || item.occurrences || 1;
    const lineW = Math.max(2, Math.min(12, 2 + (weight / maxWeight) * 10));
    const color = item.flow_type === 'spawn' || item.flow_type === 'artifact' ? '#d29922' : '#5b9bf5';
    flowRows.push({
      item,
      y,
      x0,
      x1,
      hitY0: y - Math.max(8, lineW * 1.5),
      hitY1: y + Math.max(8, lineW * 1.5),
    });

    /* Left label */
    ctx.textAlign = 'right';
    ctx.font = "10px 'IBM Plex Mono', monospace";
    ctx.fillStyle = '#a0a0a0';
    const label = flowLabel(item);
    const shortLabel = label.length > 22 ? label.slice(0, 21) + '…' : label;
    ctx.fillText(shortLabel, pad.left - 8, y);

    /* Sankey-like ribbon */
    const cp = Math.max(24, (x1 - x0) * 0.35);
    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.globalAlpha = item.flow_type === 'artifact' ? 0.72 : 0.62;
    ctx.beginPath();
    ctx.moveTo(x0, y);
    ctx.bezierCurveTo(x0 + cp, y - rowGap * 0.35, x1 - cp, y - rowGap * 0.35, x1, y);
    ctx.stroke();
    ctx.globalAlpha = 1;

    /* Endpoints */
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x0, y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x1, y, 3, 0, Math.PI * 2);
    ctx.fill();

    /* Metric label */
    ctx.textAlign = 'left';
    ctx.fillStyle = '#666';
    const metric = item.flow_type === 'artifact'
      ? `${item.occurrences} req · ${fmtK(item.tokens)}`
      : `${item.flow_type} · ${fmtK(item.carried_tokens || item.value)}${item.similarity ? ` · ${(item.similarity * 100).toFixed(0)}%` : ''}`;
    ctx.fillText(metric, Math.min(x1 + 8, W - pad.right - 90), y);
  });

  /* Legend */
  ctx.textAlign = 'left';
  ctx.font = "9px 'IBM Plex Mono', monospace";
  let lx = pad.left;
  for (const [label, color] of [['Carry', '#5b9bf5'], ['Spawn / artifact', '#d29922']]) {
    ctx.fillStyle = color;
    ctx.fillRect(lx, H - 14, 10, 8);
    lx += 14;
    ctx.fillStyle = '#888';
    ctx.fillText(label, lx, H - 10);
    lx += ctx.measureText(label).width + 18;
  }

  ctx.restore();
}

if (flowCanvas) {
flowCanvas.addEventListener('click', (ev) => {
  const rect = flowCanvas.getBoundingClientRect();
  const x = ev.clientX - rect.left;
  const y = ev.clientY - rect.top;
  const node = flowNodeHitTest(x, y);
  if (node && node.block_id) {
    selectIcicleBlock(node.request_index, node.block_id);
    return;
  }
  const row = flowLinkHitTest(x, y);
  if (!row || !row.item.source_block_id) return;
  selectIcicleBlock(row.item.first_request_index, row.item.source_block_id);
});

flowCanvas.addEventListener('mousemove', (ev) => {
  const rect = flowCanvas.getBoundingClientRect();
  const x = ev.clientX - rect.left;
  const y = ev.clientY - rect.top;
  const node = flowNodeHitTest(x, y);
  const row = node ? null : flowLinkHitTest(x, y);
  const nextLink = row ? row.item : null;
  const linkChanged = (flowHoveredLink && nextLink)
    ? (flowHoveredLink.source !== nextLink.source || flowHoveredLink.target !== nextLink.target)
    : flowHoveredLink !== nextLink;
  const nodeChanged = (flowHoveredNode && node)
    ? flowHoveredNode.id !== node.id
    : flowHoveredNode !== node;
  flowHoveredLink = nextLink;
  flowHoveredNode = node;
  if (linkChanged || nodeChanged) requestAnimationFrame(renderPropagationSankey);
  renderFlowTooltip(ev, node, row);
  flowCanvas.style.cursor = (node || row) ? 'pointer' : 'default';
});

flowCanvas.addEventListener('mouseleave', () => {
  flowHoveredLink = null;
  flowHoveredNode = null;
  tooltipEl.style.display = 'none';
  renderPropagationSankey();
});

flowCanvas.addEventListener('wheel', (ev) => {
  if (flowMaxScrollY <= 0) return;
  ev.preventDefault();
  flowScrollY = clamp(flowScrollY + ev.deltaY, 0, flowMaxScrollY);
  renderPropagationSankey();
}, { passive: false });
} // end if (flowCanvas)

/* ════════════════════════════════════════════════════
   ARTIFACT DUPLICATION VIEW
   ════════════════════════════════════════════════════ */
const artifactsLeft = document.getElementById('artifacts-left');
const artifactsRight = document.getElementById('artifacts-right');
const artifactsResizeHandle = document.getElementById('artifacts-resize-handle');
let selectedArtifactDup = 0;

function artifactKeyParts(key) {
  const text = key || 'unknown';
  const idx = text.indexOf(':');
  if (idx < 0) return { prefix: 'artifact', id: text };
  return {
    prefix: text.slice(0, idx),
    id: text.slice(idx + 1) || text,
  };
}

function renderArtifactToolBadges(tools) {
  const names = (tools || []).filter(Boolean);
  const visible = names.slice(0, 2);
  const extra = names.length - visible.length;
  const badges = visible.map(tool => `<span class="artifact-tool-badge" title="${escHtml(tool)}">${escHtml(tool)}</span>`);
  if (extra > 0) badges.push(`<span class="artifact-tool-badge">+${extra}</span>`);
  return badges.join('') || '<span class="artifact-tool-badge">unknown tool</span>';
}

function renderArtifactsView() {
  const duplications = session_insights && session_insights.artifact_duplications || [];
  if (!duplications.length) {
    artifactsLeft.innerHTML = '<div class="artifact-empty">No repeated tool-result artifacts detected.</div>';
    artifactsRight.innerHTML = '';
    return;
  }
  selectedArtifactDup = clamp(selectedArtifactDup, 0, duplications.length - 1);
  artifactsLeft.innerHTML = duplications.map((item, idx) => `
    <div class="artifact-item ${idx === selectedArtifactDup ? 'active' : ''}" data-artifact-idx="${idx}">
      <div class="artifact-title artifact-title-row">
        <span class="artifact-prefix">${escHtml(artifactKeyParts(item.artifact_key).prefix)}</span>
        <span class="artifact-id" title="${escHtml(item.artifact_key)}">${escHtml(artifactKeyParts(item.artifact_key).id)}</span>
      </div>
      <div class="artifact-metrics">
        <span class="artifact-metric-chip">${item.occurrences} results</span>
        <span class="artifact-metric-chip strong">${fmtK(item.redundant_tokens)} redundant</span>
        <span class="artifact-metric-chip">${(item.avg_similarity * 100).toFixed(0)}% similar</span>
      </div>
      <div class="artifact-tools">${renderArtifactToolBadges(item.tools)}</div>
    </div>
  `).join('');
  artifactsLeft.querySelectorAll('.artifact-item').forEach(el => {
    el.addEventListener('click', () => {
      selectedArtifactDup = Number(el.dataset.artifactIdx);
      renderArtifactsView();
    });
  });

  const item = duplications[selectedArtifactDup];
  const maxTokens = Math.max(...item.blocks.map(block => block.tokens), 1);
  artifactsRight.innerHTML = `
    <div class="td-title">${escHtml(item.artifact_key)}</div>
    <div class="artifact-meta" style="margin-bottom:12px;">
      ${item.occurrences} tool results · ${fmtK(item.total_tokens)} total · ${fmtK(item.redundant_tokens)} redundant · ${(item.avg_similarity * 100).toFixed(0)}% avg similarity
    </div>
    <div class="artifact-timeline-row" style="color:var(--text-2);font-size:10px;text-transform:uppercase;letter-spacing:.6px;">
      <span>Request</span><span>Tool</span><span>Tokens</span><span>Share</span><span>Preview</span>
    </div>
    ${item.blocks.map(block => `
      <div class="artifact-timeline-row" data-request-index="${block.request_index}" data-block-id="${escHtml(block.block_id)}">
        <span>#${block.request_index}</span>
        <span>${escHtml(block.tool_name || 'unknown')}</span>
        <span>${fmtK(block.tokens)}</span>
        <span><span class="artifact-bar" style="display:inline-block;width:${Math.max(4, (block.tokens / maxTokens) * 78)}px"></span></span>
        <span style="color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(block.preview || '')}</span>
      </div>
    `).join('')}
  `;
  artifactsRight.querySelectorAll('.artifact-timeline-row[data-block-id]').forEach(row => {
    row.addEventListener('click', () => {
      selectIcicleBlock(Number(row.dataset.requestIndex), row.dataset.blockId);
    });
  });
}

/* ════════════════════════════════════════════════════
   TOOL ANALYSIS VIEW (Canvas-based)

const toolsLeftEl = document.getElementById('tools-left');
const toolsRightEl = document.getElementById('tools-right');
const toolsResizeHandle = document.getElementById('tools-resize-handle');
const toolsTableCanvas = document.getElementById('tools-table-canvas');
const toolsTableCtx = toolsTableCanvas.getContext('2d');
const toolsDetailEl = document.getElementById('tools-detail-html');

const TA_COLORS = {
  definition: '#6e4a1e',
  call: '#8957e5',
  result: '#2ea043',
};
const TA_ROW_H = 32;
const TA_HEADER_H = 28;
const TA_PAD = { top: 8, left: 12, right: 12, bottom: 8 };

let taSelectedTool = null;   /* index into tool_analysis.tools */
let taHoveredRow = -1;
let taScrollY = 0;           /* scroll offset for left table */
let taSortKey = 'total_tokens';
let taSortAsc = false;
let taSortedTools = [];

function taSortTools() {
  if (!tool_analysis || !tool_analysis.tools) { taSortedTools = []; return; }
  taSortedTools = [...tool_analysis.tools];
  taSortedTools.sort((a, b) => {
    const va = a[taSortKey] || 0, vb = b[taSortKey] || 0;
    return taSortAsc ? va - vb : vb - va;
  });
}

function renderToolsView() {
  taSortTools();
  renderToolsTable();
  renderToolsDetail();
}

function selectToolByName(toolName) {
  taSortTools();
  const idx = taSortedTools.findIndex(t => t.name === toolName);
  if (idx < 0) return;
  taSelectedTool = idx;
  const visibleRows = Math.max(1, Math.floor((toolsLeftEl.getBoundingClientRect().height - TA_HEADER_H) / TA_ROW_H));
  taScrollY = Math.max(0, (idx - Math.floor(visibleRows / 2)) * TA_ROW_H);
  renderToolsView();
}

/* ── Left panel: Tool ranking table ── */
function renderToolsTable() {
  const rect = toolsLeftEl.getBoundingClientRect();
  toolsTableCanvas.width = rect.width * dpr;
  toolsTableCanvas.height = rect.height * dpr;
  const W = rect.width, H = rect.height;
  const ctx = toolsTableCtx;
  ctx.clearRect(0, 0, toolsTableCanvas.width, toolsTableCanvas.height);
  ctx.save();
  ctx.scale(dpr, dpr);

  if (!taSortedTools.length) {
    ctx.font = "12px 'IBM Plex Mono', monospace";
    ctx.fillStyle = '#666';
    ctx.textAlign = 'center';
    ctx.fillText('No tool usage data', W / 2, H / 2);
    ctx.restore();
    return;
  }

  const totalCtx = tool_analysis.total_context_tokens || 1;

  /* Column layout */
  const cols = [
    { key: 'name', label: 'Tool Name', width: 0.30 },
    { key: 'total_tokens', label: 'Total', width: 0.12 },
    { key: 'definition_tokens', label: 'Def', width: 0.08 },
    { key: 'call_tokens', label: 'Calls', width: 0.10 },
    { key: 'result_tokens', label: 'Results', width: 0.10 },
    { key: 'call_count', label: '#', width: 0.06 },
    { key: '_bar', label: '', width: 0.24 },
  ];
  const contentW = W - TA_PAD.left - TA_PAD.right;
  let cx = TA_PAD.left;
  const colX = [];
  const colW = [];
  for (const col of cols) {
    colX.push(cx);
    const w = Math.floor(col.width * contentW);
    colW.push(w);
    cx += w;
  }

  /* Header */
  ctx.fillStyle = '#0e0e0e';
  ctx.fillRect(0, 0, W, TA_HEADER_H);
  ctx.font = "bold 10px 'IBM Plex Mono', monospace";
  ctx.textBaseline = 'middle';
  for (let i = 0; i < cols.length; i++) {
    if (cols[i].key === '_bar') continue;
    ctx.fillStyle = taSortKey === cols[i].key ? '#5b9bf5' : '#888';
    ctx.textAlign = 'left';
    let label = cols[i].label;
    if (taSortKey === cols[i].key) label += taSortAsc ? ' ↑' : ' ↓';
    ctx.fillText(label, colX[i], TA_HEADER_H / 2);
  }

  /* Separator */
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, TA_HEADER_H);
  ctx.lineTo(W, TA_HEADER_H);
  ctx.stroke();

  /* Rows */
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, TA_HEADER_H, W, H - TA_HEADER_H);
  ctx.clip();

  const barColIdx = cols.findIndex(c => c.key === '_bar');
  const maxTotal = taSortedTools[0] ? taSortedTools[0].total_tokens : 1;

  for (let r = 0; r < taSortedTools.length; r++) {
    const tool = taSortedTools[r];
    const ry = TA_HEADER_H + r * TA_ROW_H - taScrollY;
    if (ry + TA_ROW_H < TA_HEADER_H || ry > H) continue;

    /* Row background */
    const isSelected = taSelectedTool !== null && taSortedTools[taSelectedTool] === tool;
    const isHovered = r === taHoveredRow;
    if (isSelected) {
      ctx.fillStyle = 'rgba(91, 155, 245, 0.15)';
      ctx.fillRect(0, ry, W, TA_ROW_H);
    } else if (isHovered) {
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      ctx.fillRect(0, ry, W, TA_ROW_H);
    }

    ctx.font = "11px 'IBM Plex Mono', monospace";
    ctx.textBaseline = 'middle';
    const cy = ry + TA_ROW_H / 2;

    for (let i = 0; i < cols.length; i++) {
      if (cols[i].key === '_bar') continue;
      ctx.textAlign = 'left';

      if (cols[i].key === 'name') {
        ctx.fillStyle = isSelected ? '#5b9bf5' : '#e0e0e0';
        const maxChars = Math.floor(colW[i] / 7);
        const name = tool.name.length > maxChars ? tool.name.slice(0, maxChars - 1) + '…' : tool.name;
        ctx.fillText(name, colX[i], cy);
      } else {
        ctx.fillStyle = '#a0a0a0';
        ctx.fillText(fmtK(tool[cols[i].key]), colX[i], cy);
      }
    }

    /* Stacked bar */
    if (barColIdx >= 0) {
      const bx = colX[barColIdx];
      const bw = colW[barColIdx] - 4;
      const barTotal = tool.total_tokens || 1;
      const scale = bw * (tool.total_tokens / (maxTotal || 1));

      const defW = (tool.definition_tokens / barTotal) * scale;
      const callW = (tool.call_tokens / barTotal) * scale;
      const resW = (tool.result_tokens / barTotal) * scale;

      let bxx = bx;
      ctx.fillStyle = TA_COLORS.definition;
      ctx.fillRect(bxx, ry + 8, defW, TA_ROW_H - 16);
      bxx += defW;
      ctx.fillStyle = TA_COLORS.call;
      ctx.fillRect(bxx, ry + 8, callW, TA_ROW_H - 16);
      bxx += callW;
      ctx.fillStyle = TA_COLORS.result;
      ctx.fillRect(bxx, ry + 8, resW, TA_ROW_H - 16);

      /* % label — right-aligned within bar column to prevent overflow */
      const pct = fmtPct(tool.total_tokens, totalCtx);
      ctx.font = "9px 'IBM Plex Mono', monospace";
      const pctW = ctx.measureText(pct).width;
      const barEnd = bxx + resW;
      const colEnd = bx + bw;
      if (barEnd + 4 + pctW <= colEnd) {
        /* Fits after the bar */
        ctx.fillStyle = '#666';
        ctx.fillText(pct, barEnd + 4, cy);
      } else {
        /* Doesn't fit — draw inside bar, right-aligned to column edge */
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.textAlign = 'right';
        ctx.fillText(pct, colEnd, cy);
        ctx.textAlign = 'left';
      }
    }

    /* Row separator */
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, ry + TA_ROW_H);
    ctx.lineTo(W, ry + TA_ROW_H);
    ctx.stroke();
  }

  ctx.restore();

  /* Legend at bottom */
  ctx.font = "9px 'IBM Plex Mono', monospace";
  ctx.textBaseline = 'bottom';
  const legendY = H - 6;
  let lx = TA_PAD.left;
  for (const [label, color] of [['Definition', TA_COLORS.definition], ['Calls', TA_COLORS.call], ['Results', TA_COLORS.result]]) {
    ctx.fillStyle = color;
    ctx.fillRect(lx, legendY - 8, 10, 8);
    lx += 14;
    ctx.fillStyle = '#888';
    ctx.fillText(label, lx, legendY);
    lx += ctx.measureText(label).width + 12;
  }

  ctx.restore();
}

/* ── Right panel: Tool detail (HTML-based) ── */
function renderToolsDetail() {
  if (taSelectedTool === null || !taSortedTools[taSelectedTool]) {
    toolsDetailEl.innerHTML = '<div class="td-empty">Click a tool to view details</div>';
    return;
  }

  const tool = taSortedTools[taSelectedTool];
  const totalCtx = tool_analysis.total_context_tokens || 1;

  let html = '';
  html += `<div class="td-title">${escHtml(tool.name)}</div>`;

  /* Stats grid */
  html += '<div class="td-stats">';
  const stats = [
    ['Total', fmtK(tool.total_tokens), fmtPct(tool.total_tokens, totalCtx)],
    ['Definition', fmtK(tool.definition_tokens), fmtPct(tool.definition_tokens, totalCtx)],
    ['Calls', fmtK(tool.call_tokens), 'avg ' + fmtK(tool.avg_call_tokens)],
    ['Results', fmtK(tool.result_tokens), 'avg ' + fmtK(tool.avg_result_tokens)],
    ['Invocations', String(tool.call_count), ''],
  ];
  for (const [label, val, extra] of stats) {
    html += `<span class="label">${label}:</span><span>${val}</span><span class="extra">${extra}</span>`;
  }
  html += '</div>';

  /* Raw definition */
  if (tool.raw_definition) {
    html += '<hr class="td-sep">';
    html += '<div class="td-raw-label">Tool Definition</div>';
    html += `<div class="td-raw">${formatRawContent(tool.raw_definition)}</div>`;
  }

  /* Invocations with raw content */
  if (tool.calls && tool.calls.length > 0) {
    html += '<hr class="td-sep">';
    /* Table header */
    html += '<div class="td-tbl-header">';
    html += '<span>Msg #</span><span>Call</span><span>Result</span><span>Total</span><span></span><span></span>';
    html += '</div>';

    const maxTotal = tool.calls[0].call_tokens + tool.calls[0].result_tokens || 1;

    for (let i = 0; i < tool.calls.length; i++) {
      const inv = tool.calls[i];
      const invTotal = inv.call_tokens + inv.result_tokens;
      /* Mini bar widths */
      const miniScale = (invTotal / maxTotal) * 100;
      const miniCallPct = (inv.call_tokens / (invTotal || 1)) * miniScale;
      const miniResPct = miniScale - miniCallPct;

      html += `<div class="td-inv" data-idx="${i}">`;
      html += '<div class="td-inv-header">';
      html += `<span class="idx">#${inv.index}</span>`;
      html += `<span class="tok" style="color:${TA_COLORS.call}">${fmtK(inv.call_tokens)}</span>`;
      html += `<span class="tok" style="color:${TA_COLORS.result}">${fmtK(inv.result_tokens)}</span>`;
      html += `<span class="tok">${fmtK(invTotal)}</span>`;
      html += `<span class="mini-bar"><span style="width:${miniCallPct}%;background:${TA_COLORS.call}"></span><span style="width:${miniResPct}%;background:${TA_COLORS.result}"></span></span>`;
      html += '<span class="arrow" aria-hidden="true"></span>';
      html += '</div>';
      html += '<div class="td-inv-body">';
      if (inv.raw_call != null) {
        html += '<div class="td-raw-label">Call Arguments</div>';
        html += `<div class="td-raw">${formatRawContent(inv.raw_call)}</div>`;
      }
      if (inv.raw_result != null) {
        html += '<div class="td-raw-label">Result</div>';
        html += `<div class="td-raw">${formatRawContent(inv.raw_result)}</div>`;
      }
      if (inv.raw_call == null && inv.raw_result == null) {
        html += '<div class="td-raw" style="color:#666;padding:8px 10px">No raw content available</div>';
      }
      html += '</div></div>';
    }
  }

  toolsDetailEl.innerHTML = html;

  /* Toggle invocation expand/collapse */
  toolsDetailEl.querySelectorAll('.td-inv-header').forEach(h => {
    h.addEventListener('click', () => {
      h.parentElement.classList.toggle('open');
    });
  });
}

function formatRawContent(content) {
  if (typeof content === 'object' && content !== null) {
    return escHtml(JSON.stringify(content, null, 2));
  }
  /* Try to pretty-print JSON strings */
  if (typeof content === 'string') {
    try {
      const parsed = JSON.parse(content);
      return escHtml(JSON.stringify(parsed, null, 2));
    } catch(e) {}
    return escHtml(content);
  }
  return escHtml(String(content));
}

/* ── Tool table interactions ── */
function taTableHitRow(clientY) {
  const rect = toolsLeftEl.getBoundingClientRect();
  const y = clientY - rect.top;
  if (y < TA_HEADER_H) return -2; /* header */
  const row = Math.floor((y - TA_HEADER_H + taScrollY) / TA_ROW_H);
  if (row < 0 || row >= taSortedTools.length) return -1;
  return row;
}

function taTableHitCol(clientX) {
  const rect = toolsLeftEl.getBoundingClientRect();
  const x = clientX - rect.left;
  const contentW = rect.width - TA_PAD.left - TA_PAD.right;
  const cols = [
    { key: 'name', width: 0.30 },
    { key: 'total_tokens', width: 0.12 },
    { key: 'definition_tokens', width: 0.08 },
    { key: 'call_tokens', width: 0.10 },
    { key: 'result_tokens', width: 0.10 },
    { key: 'call_count', width: 0.06 },
    { key: '_bar', width: 0.24 },
  ];
  let cx = TA_PAD.left;
  for (const col of cols) {
    const w = Math.floor(col.width * contentW);
    if (x >= cx && x < cx + w) return col.key;
    cx += w;
  }
  return null;
}

toolsTableCanvas.addEventListener('click', (ev) => {
  const row = taTableHitRow(ev.clientY);
  if (row === -2) {
    /* Header click: toggle sort */
    const col = taTableHitCol(ev.clientX);
    if (col && col !== '_bar') {
      if (taSortKey === col) {
        taSortAsc = !taSortAsc;
      } else {
        taSortKey = col;
        taSortAsc = col === 'name';
      }
      taSelectedTool = null;
      renderToolsView();
    }
    return;
  }
  if (row >= 0 && row < taSortedTools.length) {
    taSelectedTool = row;
    renderToolsView();
  }
});

toolsTableCanvas.addEventListener('mousemove', (ev) => {
  const row = taTableHitRow(ev.clientY);
  const newHover = row >= 0 ? row : -1;
  if (newHover !== taHoveredRow) {
    taHoveredRow = newHover;
    renderToolsTable();
  }
  toolsTableCanvas.style.cursor = (row >= 0 || row === -2) ? 'pointer' : 'default';

  /* Tooltip on bar/pct column */
  if (row >= 0 && row < taSortedTools.length) {
    const col = taTableHitCol(ev.clientX);
    if (col === '_bar') {
      const tool = taSortedTools[row];
      const totalCtx = tool_analysis.total_context_tokens || 1;
      let html = `<div class="tt-name">${escHtml(tool.name)}</div>`;
      html += `<div class="tt-row">Total: <span class="tt-val">${fmtK(tool.total_tokens)}</span> <span class="tt-pct">(${fmtPct(tool.total_tokens, totalCtx)})</span></div>`;
      html += `<div class="tt-row" style="color:${TA_COLORS.definition}">Definition: <span class="tt-val">${fmtK(tool.definition_tokens)}</span> <span class="tt-pct">(${fmtPct(tool.definition_tokens, totalCtx)})</span></div>`;
      html += `<div class="tt-row" style="color:${TA_COLORS.call}">Calls: <span class="tt-val">${fmtK(tool.call_tokens)}</span> <span class="tt-pct">(${fmtPct(tool.call_tokens, totalCtx)})</span></div>`;
      html += `<div class="tt-row" style="color:${TA_COLORS.result}">Results: <span class="tt-val">${fmtK(tool.result_tokens)}</span> <span class="tt-pct">(${fmtPct(tool.result_tokens, totalCtx)})</span></div>`;
      html += `<div class="tt-row">Invocations: <span class="tt-val">${tool.call_count}</span></div>`;
      tooltipEl.innerHTML = html;
      tooltipEl.style.display = 'block';
      moveTooltip(ev);
    } else {
      tooltipEl.style.display = 'none';
    }
  } else {
    tooltipEl.style.display = 'none';
  }
});

toolsTableCanvas.addEventListener('mouseleave', () => {
  if (taHoveredRow !== -1) {
    taHoveredRow = -1;
    renderToolsTable();
  }
  tooltipEl.style.display = 'none';
});

toolsTableCanvas.addEventListener('wheel', (ev) => {
  ev.preventDefault();
  const maxScroll = Math.max(0, taSortedTools.length * TA_ROW_H - (toolsLeftEl.getBoundingClientRect().height - TA_HEADER_H));
  taScrollY = clamp(taScrollY + ev.deltaY, 0, maxScroll);
  renderToolsTable();
}, { passive: false });

/* ── Artifacts pane horizontal resize handle ── */
{
  let dragging = false, startX = 0, startW = 0;
  artifactsResizeHandle.addEventListener('mousedown', (ev) => {
    ev.preventDefault();
    dragging = true;
    startX = ev.clientX;
    startW = artifactsLeft.getBoundingClientRect().width;
    artifactsResizeHandle.classList.add('dragging');
    document.body.style.cursor = 'ew-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', (ev) => {
    if (!dragging) return;
    const paneW = document.getElementById('artifacts-pane').getBoundingClientRect().width;
    const newW = clamp(startW + (ev.clientX - startX), 260, paneW - 320);
    artifactsLeft.style.width = newW + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    artifactsResizeHandle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
}

/* ── Tools pane horizontal resize handle ── */
{
  let dragging = false, startX = 0, startW = 0;
  toolsResizeHandle.addEventListener('mousedown', (ev) => {
    ev.preventDefault();
    dragging = true;
    startX = ev.clientX;
    startW = toolsLeftEl.getBoundingClientRect().width;
    toolsResizeHandle.classList.add('dragging');
    document.body.style.cursor = 'ew-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', (ev) => {
    if (!dragging) return;
    const paneW = document.getElementById('tools-pane').getBoundingClientRect().width;
    const newW = clamp(startW + (ev.clientX - startX), 200, paneW - 200);
    toolsLeftEl.style.width = newW + 'px';
    renderToolsTable();
    renderToolsDetail();
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    toolsResizeHandle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
}

/* ════════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════════ */
document.getElementById('mode-badge').textContent = metrics.mode || 'snapshot';
renderFindings();

if (session_trees.length > 1) {
  /* Session mode: start at last round */
  switchToRound(session_trees.length - 1);
} else if (session_trees.length === 1) {
  switchToRound(0);
} else {
  /* Snapshot mode */
  switchToSnapshot();
}
