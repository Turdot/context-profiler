<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>context-profiler</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root {
  --bg-0: #060606;
  --bg-1: #0e0e0e;
  --bg-2: #1a1a1a;
  --bg-3: #252525;
  --border: #2a2a2a;
  --text-0: #e0e0e0;
  --text-1: #a0a0a0;
  --text-2: #666;
  --accent: #5b9bf5;
  --color-system: #484f58;
  --color-user: #1f6feb;
  --color-assistant: #238636;
  --color-tool: #8957e5;
  --color-tool-use: #da6d28;
  --color-tool-result: #2ea043;
  --color-tool-def: #6e4a1e;
  --color-text: #388bfd;
  --color-field: #9e6a03;
  --color-messages: #30363d;
  --color-root: #21262d;
  --color-tool-defs: #5a3e1e;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'IBM Plex Mono', 'SF Mono', 'Fira Code', monospace;
  background: var(--bg-0);
  color: var(--text-0);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Toolbar ─────────────────────────────────────── */
.toolbar {
  height: 24px;
  min-height: 24px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 11px;
  gap: 12px;
  user-select: none;
}
.toolbar-title {
  font-weight: 600;
  color: var(--text-1);
  letter-spacing: 0.5px;
}
.toolbar-sep {
  width: 1px;
  height: 12px;
  background: var(--border);
}
.toolbar-badge {
  font-size: 10px;
  color: var(--text-2);
  padding: 1px 6px;
  background: var(--bg-3);
  border-radius: 3px;
}
.toolbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toolbar-btn {
  font-size: 10px;
  color: var(--text-2);
  padding: 1px 8px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.10s ease, border-color 0.10s ease, color 0.10s ease, transform 0.10s ease;
}
.toolbar-btn:hover { background: var(--bg-3); color: var(--text-1); transform: translateY(-1px); }
.toolbar-btn:focus-visible,
.findings-close:focus-visible {
  outline: 1px solid var(--accent);
  outline-offset: 2px;
}
.toolbar-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.toolbar-btn.has-findings {
  color: var(--text-0);
  border-color: rgba(210,153,34,0.6);
}

/* ── Findings drawer ─────────────────────────────── */
.findings-panel {
  position: fixed;
  top: 24px;
  right: 0;
  bottom: 0;
  width: min(420px, 42vw);
  min-width: 320px;
  background: var(--bg-1);
  border-left: 1px solid var(--border);
  z-index: 20;
  transform: translateX(100%);
  transition: transform 0.12s ease-out;
  display: flex;
  flex-direction: column;
}
.findings-panel.open { transform: translateX(0); }
.findings-header {
  height: 34px;
  min-height: 34px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.findings-title { font-size: 11px; font-weight: 600; color: var(--text-0); }
.findings-count { font-size: 10px; color: var(--text-2); }
.findings-close {
  margin-left: auto;
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-2);
  width: 18px;
  height: 18px;
  line-height: 16px;
  border-radius: 3px;
  font: 13px/16px 'IBM Plex Mono', monospace;
  cursor: pointer;
  padding: 0;
  text-align: center;
}
.findings-close:hover { color: var(--text-0); background: var(--bg-3); border-color: var(--border); }
.findings-list {
  overflow: auto;
  padding: 8px;
}
.finding-group {
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: 8px;
  background: rgba(255,255,255,0.015);
  overflow: hidden;
  transition: border-color 0.12s ease, background 0.12s ease;
}
.finding-group:hover { border-color: rgba(91,155,245,0.32); }
.finding-group-header {
  height: 28px;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 9px;
  cursor: pointer;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  transition: background 0.10s ease;
}
.finding-group-header:hover { background: var(--bg-3); }
.finding-group-toggle {
  color: var(--text-2);
  width: 12px;
  font-size: 10px;
}
.finding-group-title {
  flex: 1;
  color: var(--text-0);
  font-size: 11px;
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.finding-group-meta {
  color: var(--text-2);
  font-size: 10px;
}
.finding-group.collapsed .finding-group-items { display: none; }
.finding-group.collapsed .finding-group-header { border-bottom: 0; }
.finding-item {
  border-bottom: 1px solid rgba(255,255,255,0.05);
  background: transparent;
  padding: 7px 9px 8px 28px;
  cursor: pointer;
  transition: background 0.10s ease;
}
.finding-item:last-child { border-bottom: 0; }
.finding-item:hover { background: var(--bg-3); }
.finding-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.finding-kind {
  font-size: 9px;
  text-transform: uppercase;
  color: var(--text-2);
  letter-spacing: 0.5px;
}
.finding-severity {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--bg-3);
  color: var(--text-1);
}
.finding-severity.critical { color: #ff7b72; }
.finding-severity.warning { color: #d29922; }
.finding-code { font-size: 11px; color: var(--text-0); font-weight: 600; line-height: 1.35; }
.finding-message { font-size: 10px; color: var(--text-1); line-height: 1.45; margin-top: 4px; }
.finding-evidence { font-size: 10px; color: var(--text-2); margin-top: 5px; line-height: 1.4; }
.findings-empty {
  color: var(--text-2);
  font-size: 11px;
  padding: 14px 8px;
}

/* ── Timeline ────────────────────────────────────── */
.timeline {
  height: 100px;
  min-height: 50px;
  background: var(--bg-1);
  position: relative;
  cursor: pointer;
}
.timeline canvas {
  display: block;
  width: 100%;
  height: 100%;
}
.timeline-resize-handle {
  height: 4px;
  min-height: 4px;
  background: var(--border);
  cursor: ns-resize;
  user-select: none;
  position: relative;
}
.timeline-resize-handle:hover,
.timeline-resize-handle.dragging {
  background: var(--accent);
}
.timeline-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-2);
  font-size: 11px;
}

/* ── Icicle ──────────────────────────────────────── */
.icicle-pane {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg-0);
}
.icicle-pane canvas {
  display: block;
  width: 100%;
  height: 100%;
}
.breadcrumb-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 22px;
  background: rgba(6,6,6,0.85);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  padding: 0 10px;
  font-size: 10px;
  color: var(--text-2);
  gap: 4px;
  z-index: 2;
  pointer-events: none;
}
.breadcrumb-bar span { pointer-events: auto; }
.breadcrumb-bar .bc-link { color: var(--accent); cursor: pointer; }
.breadcrumb-bar .bc-link:hover { text-decoration: underline; }
.breadcrumb-bar .bc-sep { color: var(--text-2); }
.breadcrumb-bar .bc-current { color: var(--text-0); font-weight: 500; }

/* ── Detail panel ────────────────────────────────── */
.detail-resize-handle {
  height: 4px;
  min-height: 4px;
  background: var(--border);
  cursor: ns-resize;
  user-select: none;
  display: none;
  position: relative;
}
.detail-resize-handle:hover,
.detail-resize-handle.dragging {
  background: var(--accent);
}
.detail-resize-handle.visible { display: block; }
.detail-panel {
  height: 0;
  min-height: 0;
  background: var(--bg-1);
  overflow: hidden;
  display: flex;
  flex-direction: row;
  padding: 0;
}
.detail-panel.open {
  height: 220px;
  min-height: 80px;
}
.detail-left {
  width: 280px;
  min-width: 200px;
  max-width: 400px;
  overflow-y: auto;
  padding: 10px 14px;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}
.detail-left::-webkit-scrollbar { width: 4px; background: var(--bg-1); }
.detail-left::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 2px; }
.detail-left::-webkit-scrollbar-thumb:hover { background: var(--text-2); }
.detail-right {
  flex: 1;
  overflow: auto;
  padding: 8px 12px;
  min-width: 0;
}
.detail-right::-webkit-scrollbar { width: 4px; height: 4px; background: var(--bg-1); }
.detail-right::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 2px; }
.detail-right::-webkit-scrollbar-thumb:hover { background: var(--text-2); }
.detail-cell {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-bottom: 8px;
}
.detail-cell:last-child { margin-bottom: 0; }
.detail-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-2);
}
.detail-value {
  font-size: 12px;
  color: var(--text-0);
  word-break: break-all;
}
.detail-value.mono { font-size: 11px; }
.detail-tag {
  display: inline-block;
  font-size: 10px;
  padding: 0 5px;
  border-radius: 3px;
  background: var(--bg-3);
  color: var(--text-1);
  margin-right: 4px;
}

/* ── JSON tree viewer ────────────────────────────── */
.json-tree { font-size: 11px; line-height: 1.6; white-space: pre; }
.json-key { color: #79c0ff; }
.json-str { color: #a5d6ff; }
.json-multiline-str { white-space: pre-wrap; word-break: break-word; }
.json-num { color: #d2a8ff; }
.json-bool { color: #ff7b72; }
.json-null { color: #8b949e; }
.json-bracket { color: #8b949e; }
.json-toggle {
  display: inline-block;
  width: 14px;
  cursor: pointer;
  user-select: none;
  color: var(--text-2);
  text-align: center;
}
.json-toggle:hover { color: var(--accent); }
.json-collapsed-hint { color: var(--text-2); font-style: italic; font-size: 10px; }
.json-line { min-height: 18px; }
.json-line:hover { background: rgba(255,255,255,0.03); }

/* ── Tooltip ─────────────────────────────────────── */
.tooltip {
  position: fixed;
  pointer-events: none;
  z-index: 100;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 11px;
  line-height: 1.6;
  max-width: 340px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.6);
  display: none;
}
.tooltip .tt-name { font-weight: 600; color: var(--text-0); margin-bottom: 2px; }
.tooltip .tt-row { color: var(--text-1); }
.tooltip .tt-val { color: var(--text-0); font-weight: 500; }
.tooltip .tt-pct { color: var(--accent); }

/* ── Role filter chips ─────────────────────────────── */
.role-filter-bar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 12px;
  background: var(--bg-0);
  border-bottom: 1px solid var(--border);
  font-size: 10px;
}
.role-filter-bar .label { color: var(--text-2); margin-right: 2px; }
.role-chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid transparent;
  cursor: pointer;
  font-size: 10px;
  font-family: 'IBM Plex Mono', monospace;
  color: #fff;
  opacity: 0.75;
  transition: opacity 0.15s, border-color 0.15s;
}
.role-chip:hover { opacity: 1; }
.role-chip.active { opacity: 1; border-color: #fff; }
.role-chip .chip-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}

/* ── Tool Analysis view ─────────────────────────── */
.tools-pane {
  flex: 1;
  display: none;
  flex-direction: row;
  overflow: hidden;
  background: var(--bg-0);
}
.tools-pane.visible { display: flex; }
.tools-left {
  width: 40%;
  min-width: 200px;
  overflow: hidden;
  border-right: none;
  display: flex;
  flex-direction: column;
}
.tools-resize-handle {
  width: 5px;
  cursor: ew-resize;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.15s;
}
.tools-resize-handle:hover,
.tools-resize-handle.dragging {
  background: var(--accent);
}
.tools-left canvas {
  display: block;
  width: 100%;
  flex: 1;
}
.tools-right {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.tools-detail-html {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: #e0e0e0;
}
.tools-detail-html::-webkit-scrollbar { width: 6px; }
.tools-detail-html::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
.tools-detail-html .td-empty {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: #666; font-size: 12px;
}
.tools-detail-html .td-title {
  font-weight: bold; font-size: 14px; margin-bottom: 12px;
}
.tools-detail-html .td-stats {
  display: grid; grid-template-columns: auto auto auto; gap: 2px 16px;
  margin-bottom: 12px; line-height: 1.6;
}
.tools-detail-html .td-stats .label { color: #888; }
.tools-detail-html .td-stats .extra { color: #666; }
.tools-detail-html .td-sep {
  border: none; border-top: 1px solid #2a2a2a; margin: 12px 0;
}
.tools-detail-html .td-inv {
  margin: 0;
}
.tools-detail-html .td-inv-header {
  display: grid; grid-template-columns: 50px 80px 90px 70px 1fr 20px;
  align-items: center; gap: 0;
  padding: 0 10px; height: 22px;
  cursor: pointer; user-select: none;
  font-size: 11px;
  transition: background 0.10s ease;
}
.tools-detail-html .td-inv-header:hover { background: rgba(255,255,255,0.04); }
.tools-detail-html .td-inv.open > .td-inv-header { background: rgba(91,155,245,0.1); }
.tools-detail-html .td-inv-header .idx { color: #a0a0a0; }
.tools-detail-html .td-inv-header .tok { font-size: 11px; }
.tools-detail-html .td-inv-header .arrow {
  width: 14px;
  height: 14px;
  justify-self: end;
  position: relative;
  transition: transform 0.15s ease;
}
.tools-detail-html .td-inv-header .arrow::before {
  content: "";
  position: absolute;
  left: 4px;
  top: 3px;
  width: 0;
  height: 0;
  border-top: 4px solid transparent;
  border-bottom: 4px solid transparent;
  border-left: 5px solid #666;
}
.tools-detail-html .td-inv-header .mini-bar {
  display: flex; height: 10px; border-radius: 1px; overflow: hidden;
}
.tools-detail-html .td-inv-body { display: none; border-top: 1px solid #1a1a1a; }
.tools-detail-html .td-inv.open .td-inv-body { display: block; }
.tools-detail-html .td-inv.open .arrow { transform: rotate(90deg); }
.tools-detail-html .td-inv + .td-inv {
  border-top: 1px solid rgba(255,255,255,0.04);
}
.tools-detail-html .td-tbl-header {
  display: grid; grid-template-columns: 50px 80px 90px 70px 1fr 20px;
  align-items: center; gap: 0;
  padding: 0 10px; height: 18px;
  font-size: 10px; font-weight: bold; color: #888;
}
.tools-detail-html .td-raw-label {
  font-size: 9px; font-weight: bold; color: #666;
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 6px 10px 2px; background: #0a0a0a;
}
.tools-detail-html .td-raw {
  padding: 8px 10px; background: #0a0a0a;
  white-space: pre-wrap; word-break: break-all;
  color: #b0b0b0; font-size: 10px; line-height: 1.5;
  max-height: 300px; overflow-y: auto;
}
.tools-detail-html .td-raw::-webkit-scrollbar { width: 4px; }
.tools-detail-html .td-raw::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
.tools-empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-2);
  font-size: 12px;
}

/* ── Session Flow view ───────────────────────────── */
.flow-pane {
  flex: 1;
  display: none;
  overflow: hidden;
  background: var(--bg-0);
  position: relative;
}
.flow-pane.visible { display: block; }
.flow-pane canvas {
  display: block;
  width: 100%;
  height: 100%;
}
.flow-echarts {
  position: absolute;
  inset: 0;
  display: none;
}
.flow-pane.echarts-active > #flow-canvas { display: none; }
.flow-pane.echarts-active .flow-echarts { display: block; }
.flow-empty {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-2);
  font-size: 12px;
  pointer-events: none;
}

/* ── Artifact Duplication view ───────────────────── */
.artifacts-pane {
  flex: 1;
  display: none;
  overflow: hidden;
  background: var(--bg-0);
  color: var(--text-0);
  font-size: 11px;
}
.artifacts-pane.visible { display: flex; }
.artifacts-left {
  width: 34%;
  min-width: 260px;
  border-right: none;
  overflow-y: auto;
  padding: 10px;
}
.artifacts-resize-handle {
  width: 5px;
  cursor: ew-resize;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.15s;
}
.artifacts-resize-handle:hover,
.artifacts-resize-handle.dragging {
  background: var(--accent);
}
.artifacts-right {
  flex: 1;
  overflow: auto;
  padding: 14px;
}
.artifacts-left::-webkit-scrollbar,
.artifacts-right::-webkit-scrollbar {
  width: 6px;
  height: 6px;
  background: var(--bg-1);
}
.artifacts-left::-webkit-scrollbar-thumb,
.artifacts-right::-webkit-scrollbar-thumb {
  background: var(--bg-3);
  border-radius: 3px;
}
.artifacts-left::-webkit-scrollbar-thumb:hover,
.artifacts-right::-webkit-scrollbar-thumb:hover {
  background: var(--text-2);
}
.artifact-item {
  border: 1px solid var(--border);
  background: var(--bg-2);
  border-radius: 4px;
  padding: 8px 9px 9px 11px;
  margin-bottom: 8px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.12s ease, background 0.12s ease, transform 0.12s ease, box-shadow 0.12s ease;
}
.artifact-item::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: transparent;
}
.artifact-item:hover {
  border-color: rgba(91,155,245,0.45);
  background: var(--bg-3);
  transform: translateX(2px);
}
.artifact-item.active {
  border-color: var(--accent);
  background: linear-gradient(90deg, rgba(91,155,245,0.16), var(--bg-3) 42%);
  box-shadow: inset 0 0 0 1px rgba(91,155,245,0.08);
}
.artifact-item.active::before { background: var(--accent); }
.artifact-title { color: var(--text-0); font-weight: 600; margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.artifact-title-row { display: flex; align-items: center; gap: 6px; min-width: 0; }
.artifact-prefix {
  color: var(--text-2);
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.035);
  border-radius: 3px;
  padding: 0 4px;
  font-size: 9px;
  font-weight: 500;
  flex: 0 0 auto;
}
.artifact-id { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.artifact-meta { color: var(--text-2); font-size: 10px; line-height: 1.5; }
.artifact-metrics { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
.artifact-metric-chip {
  color: var(--text-1);
  background: rgba(255,255,255,0.045);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 999px;
  padding: 1px 6px;
  font-size: 9px;
  line-height: 1.5;
}
.artifact-metric-chip.strong {
  color: #d29922;
  border-color: rgba(210,153,34,0.26);
  background: rgba(210,153,34,0.08);
}
.artifact-tools { display: flex; flex-wrap: wrap; gap: 4px; }
.artifact-tool-badge {
  color: var(--text-2);
  background: rgba(91,155,245,0.08);
  border: 1px solid rgba(91,155,245,0.14);
  border-radius: 3px;
  padding: 1px 5px;

}

  display: grid;
  grid-template-columns: 56px 160px 80px 90px 1fr;
  gap: 10px;
  align-items: center;
  min-height: 28px;
  border-bottom: 1px solid rgba(255,255,255,0.05);

  overflow: hidden;

}
.artifact-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-2);
}

</style>
</head>
<body>

  </div>

<script>
/* ════════════════════════════════════════════════════
   DATA INJECTION
   ════════════════════════════════════════════════════ */
const DATA = /*__DATA__*/null;
if (!DATA) {
  document.body.innerHTML = '<p style="padding:40px;color:#f85149;font-family:monospace;">No data loaded.</p>';
  throw new Error('No data');
}

const { metrics, icicle, timeline, session_trees, warnings, tool_analysis, context_diff, session_insights, persistence_blocks, diagnosis } = DATA;
const diffTransitions = (context_diff && context_diff.transitions) || [];
const diffHints = (context_diff && context_diff.diff_hints) || [];
const diffByRequest = new Map(diffTransitions.map(d => [d.request_index, d]));
const hintsByRequest = new Map();
for (const hint of diffHints) {
  if (hint.request_index === undefined || hint.request_index === null) continue;
  const arr = hintsByRequest.get(hint.request_index) || [];
  arr.push(hint);
  hintsByRequest.set(hint.request_index, arr);
}

/* ════════════════════════════════════════════════════
   HELPERS
   ════════════════════════════════════════════════════ */
function fmtK(n) {
  if (n == null) return '0';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}
function fmtPct(n, total) {
  if (!total) return '0%';
  return ((n / total) * 100).toFixed(1) + '%';
}
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

const ROLE_COLORS = {
  system: '#484f58', msg_system: '#484f58',
  msg_user: '#1f6feb', msg_assistant: '#238636', msg_tool: '#8957e5',
  tool_use: '#da6d28', tool_result: '#2ea043', tool_def: '#6e4a1e',
  tool_defs: '#5a3e1e', text: '#388bfd', field: '#9e6a03',
  messages: '#30363d', root: '#21262d',
  history_group: '#6e7681', new_group: '#2ea043',
  removed_group: '#f85149',
};
const DIFF_COLORS = {
  unchanged: '#6e7681',
  added: '#2ea043',
  removed: '#f85149',
  modified: '#d29922',
  context: '#30363d',
};

let colorScheme = 'role';
let roleFilter = null;  /* null = no filter, or 'msg_system' | 'msg_user' | 'msg_assistant' | 'msg_tool' | ... */
let currentView = 'icicle'; /* 'icicle' | 'tools' */

function nodeMatchesFilter(node) {
  if (!roleFilter) return true;
  if (node.type === roleFilter) return true;
  /* Check descendants */
  if (node.children) {
    for (const c of node.children) {
      if (nodeMatchesFilter(c)) return true;
    }
  }
  return false;
}

function nodeColor(node) {
  if (colorScheme === 'diff' && node.diff) {
    return DIFF_COLORS[node.diff] || DIFF_COLORS.context;
  }
  return ROLE_COLORS[node.type] || '#30363d';
}

/* ════════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════════ */
let currentRound = -1;
let currentTree = null;

/* Icicle state */
let icicleHierarchy = null;  /* { root, nodes, maxDepth } */
let icicleHovered = null;
let icicleSelected = null;

/* Viewport in config space: y0/y1 = token fraction [0,1] — X (depth) is fixed */
let viewport = { y0: 0, y1: 1 };

/* DPR */
const dpr = window.devicePixelRatio || 1;

/* ════════════════════════════════════════════════════
   FINDINGS DRAWER
   ════════════════════════════════════════════════════ */
const findingsBtn = document.getElementById('findings-btn');
const findingsPanel = document.getElementById('findings-panel');
const findingsClose = document.getElementById('findings-close');
const findingsList = document.getElementById('findings-list');
const findingsCount = document.getElementById('findings-count');
const findingsItems = [
  ...((diagnosis && diagnosis.issues) || []).map((issue, idx) => ({
    kind: 'issue',
    idx,
    code: issue.code,
    severity: issue.severity || 'info',
    message: issue.message,
    evidence: issue.evidence || {},
    recommendation: issue.recommendation || '',
  })),
  ...((diagnosis && diagnosis.diff_hints) || []).map((hint, idx) => ({
    kind: 'hint',
    idx,
    code: hint.type,
    severity: hint.confidence || 'hint',
    message: hint.reason,
    evidence: hint.evidence || {},
    request_index: hint.request_index,
  })),
];
const collapsedFindingGroups = new Set();

function findingEvidenceSummary(finding) {
  const parts = [];
  if (finding.request_index !== undefined && finding.request_index !== null) {
    parts.push(`request #${finding.request_index}`);
  }
  if (finding.evidence.tool_name) parts.push(`tool ${finding.evidence.tool_name}`);
  if (finding.evidence.artifact_key) parts.push(`artifact ${finding.evidence.artifact_key}`);
  if (finding.evidence.total_wasted_tokens) parts.push(`${fmtK(finding.evidence.total_wasted_tokens)} wasted`);
  if (finding.evidence.ratio) parts.push(`${(finding.evidence.ratio * 100).toFixed(1)}%`);
  return parts.join(' · ');
}

function groupFindings(items) {
  const groups = [];
  const byKey = new Map();
  for (let i = 0; i < items.length; i++) {
    const finding = items[i];
    const key = `${finding.kind}:${finding.code}`;
    let group = byKey.get(key);
    if (!group) {
      group = {
        key,
        kind: finding.kind,
        code: finding.code,
        severity: finding.severity,
        items: [],
      };
      byKey.set(key, group);
      groups.push(group);
    }
    group.items.push({...finding, originalIndex: i});
  }
  return groups;
}

function renderFindings() {
  findingsCount.textContent = `${findingsItems.length} total`;
  findingsBtn.textContent = findingsItems.length ? `Findings ${findingsItems.length}` : 'Findings';
  if (findingsItems.length) findingsBtn.classList.add('has-findings');

  if (!findingsItems.length) {
    findingsList.innerHTML = '<div class="findings-empty">No findings for this report.</div>';
    return;
  }

  findingsList.innerHTML = groupFindings(findingsItems).map(group => {
    const collapsed = collapsedFindingGroups.has(group.key);
    const itemText = group.items.length === 1 ? '1 item' : `${group.items.length} items`;
    return `
    <div class="finding-group ${collapsed ? 'collapsed' : ''}" data-group-key="${escHtml(group.key)}">
      <div class="finding-group-header" data-group-key="${escHtml(group.key)}">
        <span class="finding-group-toggle">${collapsed ? '▶' : '▼'}</span>
        <span class="finding-kind">${escHtml(group.kind)}</span>
        <span class="finding-group-title">${escHtml(group.code)}</span>
        <span class="finding-severity ${escHtml(group.severity)}">${escHtml(group.severity)}</span>
        <span class="finding-group-meta">${itemText}</span>
      </div>
      <div class="finding-group-items">
        ${group.items.map(finding => `
          <div class="finding-item" data-finding-idx="${finding.originalIndex}">
            <div class="finding-message">${escHtml(finding.message || finding.recommendation || '')}</div>
            ${findingEvidenceSummary(finding) ? `<div class="finding-evidence">${escHtml(findingEvidenceSummary(finding))}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `;
  }).join('');
}

function toggleFindings(open) {
  const shouldOpen = open === undefined ? !findingsPanel.classList.contains('open') : open;
  findingsPanel.classList.toggle('open', shouldOpen);
  findingsBtn.classList.toggle('active', shouldOpen);
}

function navigateFinding(finding) {
  const reqIdx = finding.request_index;
  if (reqIdx !== undefined && reqIdx !== null) {
    const timelineIdx = timeline.findIndex(d => d.request_index === reqIdx);
    if (timelineIdx >= 0) {
      switchView('icicle');
      switchToRound(timelineIdx);
      return;
    }
  }

  const toolName = finding.evidence && finding.evidence.tool_name;
  if (toolName) {
    switchView('tools');
    selectToolByName(toolName);
    return;
  }

  switchView('icicle');
}

findingsBtn.addEventListener('click', () => toggleFindings());
findingsClose.addEventListener('click', () => toggleFindings(false));
findingsList.addEventListener('click', (ev) => {
  const groupHeader = ev.target.closest('.finding-group-header');
  if (groupHeader) {
    const key = groupHeader.dataset.groupKey;
    if (collapsedFindingGroups.has(key)) collapsedFindingGroups.delete(key);
    else collapsedFindingGroups.add(key);
    renderFindings();
    return;
  }

  const item = ev.target.closest('.finding-item');
  if (!item) return;
  const finding = findingsItems[Number(item.dataset.findingIdx)];
  if (finding) navigateFinding(finding);
});

/* ════════════════════════════════════════════════════
   D3-LIKE HIERARCHY + PARTITION (no D3 dependency)
   ════════════════════════════════════════════════════ */
function buildHierarchy(tree) {
  const hideRemoved = colorScheme !== 'diff';

  /* Assign depth and compute sum of leaf tokens */
  function walk(node, depth) {
    node._depth = depth;
    const kids = (node.children || []).filter(c => !(hideRemoved && c.type === 'removed_group'));
    if (kids.length > 0) {
      node._sumTokens = 0;
      for (const c of kids) {
        walk(c, depth + 1);
        node._sumTokens += c._sumTokens;
      }
      if (node._sumTokens === 0) node._sumTokens = node.tokens || 0;
    } else {
      node._sumTokens = node.tokens || 0;
    }
    node._visibleChildren = kids;
  }
  walk(tree, 0);

  /* Partition layout: vertical icicle
     x0,x1 = horizontal position (fraction of width) based on token proportion
     y0,y1 = vertical position based on depth (each level = fixed height) */
  const nodes = [];
  const LEVEL_H = 1; /* will be scaled later */

  function layout(node, x0, x1) {
    node._x0 = x0;
    node._x1 = x1;
    node._y0 = node._depth * LEVEL_H;
    node._y1 = (node._depth + 1) * LEVEL_H;
    nodes.push(node);

    const kids = node._visibleChildren || [];
    if (kids.length > 0 && node._sumTokens > 0) {
      let cx = x0;
      for (const c of kids) {
        const frac = c._sumTokens / node._sumTokens;
        const cw = frac * (x1 - x0);
        layout(c, cx, cx + cw);
        cx += cw;
      }
    }
  }
  layout(tree, 0, 1);
  return { root: tree, nodes, maxDepth: Math.max(...nodes.map(n => n._depth)) + 1 };
}

/* ════════════════════════════════════════════════════
   TIMELINE RENDERING (Canvas)
   ════════════════════════════════════════════════════ */
const tlCanvas = document.getElementById('timeline-canvas');
const tlCtx = tlCanvas.getContext('2d');
const tlEl = document.getElementById('timeline');

function resizeTimeline() {
  const rect = tlEl.getBoundingClientRect();
  tlCanvas.width = rect.width * dpr;
  tlCanvas.height = rect.height * dpr;
}

function renderTimeline() {
  resizeTimeline();
  const W = tlCanvas.width;
  const H = tlCanvas.height;
  const ctx = tlCtx;
  ctx.clearRect(0, 0, W, H);

  if (timeline.length < 2) {
    ctx.font = `${11 * dpr}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = '#666';
    ctx.textAlign = 'center';
    ctx.fillText('Single request — no timeline', W / 2, H / 2);
    return;
  }

  const hasTurns = (DATA.turn_boundaries || []).length > 1;
  const pad = { top: (hasTurns ? 18 : 6) * dpr, bottom: 16 * dpr, left: 40 * dpr, right: 16 * dpr };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;
  const n = timeline.length;
  const barW = chartW / n;
  const gap = Math.max(1, barW * 0.15);
  const bw = barW - gap;
  const yMax = Math.max(...timeline.map(d => d.total_tokens)) * 1.05 || 1;

  /* Stacked bars */
  const stackKeys = ['system_tokens', 'tool_def_tokens'];
  const stackColors = ['#484f58', '#6e4a1e'];
  const msgColor = '#388bfd';

  for (let i = 0; i < n; i++) {
    const d = timeline[i];
    const x = pad.left + i * barW + gap / 2;
    const total = d.total_tokens || 0;
    const sys = d.system_tokens || 0;
    const tools = d.tool_def_tokens || 0;
    const msg = Math.max(0, total - sys - tools);
    const segments = [
      { val: sys, color: stackColors[0] },
      { val: tools, color: stackColors[1] },
      { val: msg, color: msgColor },
    ];
    let base = 0;
    for (const seg of segments) {
      const sh = (seg.val / yMax) * chartH;
      const sy = pad.top + chartH - base - sh;
      ctx.fillStyle = seg.color;
      ctx.fillRect(x, sy, bw, sh);
      base += sh;
    }

    const diff = diffByRequest.get(d.request_index);
    const hints = hintsByRequest.get(d.request_index) || [];
    const markerHint = hints.find(h => [
      'budget_pressure',
      'compression_opportunity',
      'token_carryover_hotspot',
      'possible_artifact_lifecycle_churn',
      'large_addition',
      'high_tool_use_addition',
    ].includes(h.type));
    if (diff && markerHint) {
      const totalH = (total / yMax) * chartH;
      const markerY = pad.top + chartH - totalH - 5 * dpr;
      const markerColors = {
        budget_pressure: '#ff7b72',
        compression_opportunity: '#2ea043',
        token_carryover_hotspot: '#5b9bf5',
        possible_artifact_lifecycle_churn: '#d29922',
        large_addition: '#d29922',
        high_tool_use_addition: '#8957e5',
      };
      ctx.fillStyle = markerColors[markerHint.type] || '#d29922';
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      ctx.moveTo(x + bw / 2, markerY + 5 * dpr);
      ctx.lineTo(x + bw / 2 - 3 * dpr, markerY);
      ctx.lineTo(x + bw / 2 + 3 * dpr, markerY);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    /* Highlight current round */
    if (d.request_index === currentRound) {
      ctx.strokeStyle = '#5b9bf5';
      ctx.lineWidth = 2 * dpr;
      const totalH = (total / yMax) * chartH;
      ctx.strokeRect(x - 1, pad.top + chartH - totalH - 1, bw + 2, totalH + 2);
    }
  }

  /* Y axis labels */
  ctx.font = `${9 * dpr}px 'IBM Plex Mono', monospace`;
  ctx.fillStyle = '#666';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  const yTicks = [0, 0.25, 0.5, 0.75, 1];
  for (const t of yTicks) {
    const val = yMax * t;
    const y = pad.top + chartH * (1 - t);
    ctx.fillText(fmtK(Math.round(val)), pad.left - 4 * dpr, y);
    /* Grid line */
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(W - pad.right, y);
    ctx.stroke();
  }

  /* X axis: show every Nth label */
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const step = Math.max(1, Math.floor(n / 15));
  for (let i = 0; i < n; i += step) {
    const x = pad.left + i * barW + barW / 2;
    ctx.fillStyle = '#666';
    ctx.fillText(`#${timeline[i].request_index}`, x, pad.top + chartH + 3 * dpr);
  }

  /* Turn boundary separators */
  const boundaries = DATA.turn_boundaries || [];
  for (let b = 1; b < boundaries.length; b++) {
    const boundaryReqIdx = boundaries[b];
    /* Find the timeline index for this request_index */
    const tlIdx = timeline.findIndex(d => d.request_index === boundaryReqIdx);
    if (tlIdx < 0) continue;
    const x = pad.left + tlIdx * barW;
    /* Dashed vertical line */
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
    ctx.lineWidth = 1.5 * dpr;
    ctx.setLineDash([4 * dpr, 3 * dpr]);
    ctx.beginPath();
    ctx.moveTo(x, pad.top);
    ctx.lineTo(x, pad.top + chartH);
    ctx.stroke();
    ctx.setLineDash([]);
    /* Turn label */
    ctx.font = `${8 * dpr}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`Turn ${b + 1}`, x, pad.top - 1 * dpr);
  }
  /* Turn 1 label at start */
  if (boundaries.length > 1) {
    ctx.font = `${8 * dpr}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.fillText('Turn 1', pad.left + 2 * dpr, pad.top - 1 * dpr);
  }
}

/* Timeline hit test */
function timelineHitIndex(clientX) {
  const rect = tlEl.getBoundingClientRect();
  const pad = { left: 40, right: 16 };
  const chartW = rect.width - pad.left - pad.right;
  const x = clientX - rect.left - pad.left;
  const n = timeline.length;
  const idx = Math.floor((x / chartW) * n);
  return clamp(idx, 0, n - 1);
}

/* ════════════════════════════════════════════════════
   ICICLE RENDERING (Canvas) — VERTICAL layout
   X = depth (root left, children right, fixed column width)
   Y = token proportion (zoomable via viewport)
   ════════════════════════════════════════════════════ */
const icCanvas = document.getElementById('icicle-canvas');
const icCtx = icCanvas.getContext('2d');
const icPane = document.getElementById('icicle-pane');

let icW = 0, icH = 0;
const BREADCRUMB_H = 22;
const COL_PAD = 12;
const COL_MIN = 50;
const COL_MAX = 220;

let colWidths = [];
let colOffsets = [];

function computeColWidths() {
  colWidths = [];
  colOffsets = [];
  if (!icicleHierarchy) return;

  const { nodes, maxDepth } = icicleHierarchy;
  const canvas = document.createElement('canvas');
  const mCtx = canvas.getContext('2d');
  mCtx.font = "11px 'IBM Plex Mono', monospace";

  const maxW = new Array(maxDepth).fill(0);
  for (const node of nodes) {
    const d = node._depth;
    const name = node.name || '';
    const tok = fmtK(node.tokens);
    const w = Math.max(mCtx.measureText(name).width, mCtx.measureText(tok).width);
    if (w > maxW[d]) maxW[d] = w;
  }

  let x = 0;
  for (let d = 0; d < maxDepth; d++) {
    const w = clamp(maxW[d] + COL_PAD, COL_MIN, COL_MAX);
    colWidths.push(w);
    colOffsets.push(x);
    x += w;
  }
}

function colX(depth) { return colOffsets[depth] || 0; }
function colWidth(depth) { return colWidths[depth] || COL_MIN; }

function resizeIcicle() {
  const rect = icPane.getBoundingClientRect();
  icW = rect.width;
  icH = rect.height;
  icCanvas.width = icW * dpr;
  icCanvas.height = icH * dpr;
}

function fitViewport() {
  viewport = { y0: 0, y1: 1 };
}

function zoomToNode(node) {
  const pad = 0.02 * (node._x1 - node._x0);
  viewport.y0 = node._x0 - pad;
  viewport.y1 = node._x1 + pad;
  clampViewport();
  requestRender();
}

/* Config space (token fraction) → screen Y */
function cfgToScreenY(cy) {
  const vh = viewport.y1 - viewport.y0 || 1;
  const availH = icH - BREADCRUMB_H;
  return BREADCRUMB_H + ((cy - viewport.y0) / vh) * availH;
}
function screenToCfgY(sy) {
  const vh = viewport.y1 - viewport.y0 || 1;
  const availH = icH - BREADCRUMB_H;
  return viewport.y0 + ((sy - BREADCRUMB_H) / availH) * vh;
}

let renderRAF = null;
function requestRender() {
  if (renderRAF) return;
  renderRAF = requestAnimationFrame(() => {
    renderRAF = null;
    renderIcicle();
  });
}

/* Clamp viewport so it never exceeds [0,1] and never zooms out past full view */
function clampViewport() {
  const vh = viewport.y1 - viewport.y0;
  /* Don't allow zooming out beyond the full range */
  if (vh >= 1) {
    viewport.y0 = 0;
    viewport.y1 = 1;
    return;
  }
  /* Don't allow panning past edges */
  if (viewport.y0 < 0) {
    viewport.y0 = 0;
    viewport.y1 = vh;
  }
  if (viewport.y1 > 1) {
    viewport.y1 = 1;
    viewport.y0 = 1 - vh;
  }
}

function renderIcicle() {
  if (!icicleHierarchy) return;
  resizeIcicle();
  const ctx = icCtx;
  ctx.clearRect(0, 0, icCanvas.width, icCanvas.height);
  ctx.save();
  ctx.scale(dpr, dpr);

  const { nodes } = icicleHierarchy;
  const vy0 = viewport.y0, vy1 = viewport.y1;
  const vh = vy1 - vy0 || 1;
  const availH = icH - BREADCRUMB_H;
  const PAD = 0.5;

  for (const node of nodes) {
    const ny0 = node._x0, ny1 = node._x1;
    if (ny1 < vy0 || ny0 > vy1) continue;

    const sx = colX(node._depth);
    const cw = colWidth(node._depth);
    const sy = BREADCRUMB_H + ((ny0 - vy0) / vh) * availH;
    const sh = ((ny1 - ny0) / vh) * availH;

    if (sx > icW || sx + cw < 0 || sy > icH || sy + sh < BREADCRUMB_H || sh < 0.3) continue;

    /* Hide removed_group nodes when not in diff mode */
    if (node.type === 'removed_group' && colorScheme !== 'diff') continue;

    const rw = cw - PAD;
    const rh = Math.max(0, sh - PAD);

    /* Fill */
    const isHovered = node === icicleHovered;
    const isSelected = node === icicleSelected;
    const matchesFilter = colorScheme === 'diff'
      ? nodeMatchesDiffFilter(node)
      : nodeMatchesFilter(node);
    const hasActiveFilter = colorScheme === 'diff' ? !!diffFilter : !!roleFilter;
    ctx.fillStyle = nodeColor(node);
    ctx.globalAlpha = hasActiveFilter
      ? (matchesFilter ? (isHovered ? 1 : 0.9) : 0.12)
      : (isHovered ? 1 : 0.85);
    ctx.fillRect(sx, sy, rw, rh);

    /* Hover/select highlight */
    if (isHovered || isSelected) {
      ctx.strokeStyle = isSelected ? '#fff' : '#5b9bf5';
      ctx.lineWidth = isSelected ? 2 : 1.5;
      ctx.strokeRect(sx + 0.5, sy + 0.5, rw - 1, rh - 1);
    }

    /* Label — render if rect is wide enough and has some height */
    ctx.globalAlpha = 1;
    if (rw > 30 && rh > 8) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(sx, sy, rw, rh);
      ctx.clip();

      /* Adaptive font size based on available height */
      const fontSize = rh < 16 ? 9 : 11;
      const lineH = fontSize + 2;
      ctx.font = `${fontSize}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'left';

      const name = node.name || '';
      const tok = fmtK(node.tokens);
      const maxTextW = rw - 6;
      const charW = fontSize * 0.6;
      const charsPerLine = Math.floor(maxTextW / charW);
      const maxLines = Math.max(1, Math.floor(rh / lineH));

      if (charsPerLine >= 2) {
        if (maxLines === 1) {
          /* Single line: name truncated, centered vertically */
          const nameTrunc = name.length <= charsPerLine ? name : name.slice(0, charsPerLine - 1) + '…';
          ctx.textBaseline = 'middle';
          ctx.fillText(nameTrunc, sx + 3, sy + rh / 2);
        } else {
          /* Multi-line: wrap name, then show token count */
          ctx.textBaseline = 'top';
          const lines = [];
          let remaining = name;
          const nameLineMax = maxLines >= 3 ? maxLines - 1 : maxLines;

          while (remaining.length > 0 && lines.length < nameLineMax) {
            if (remaining.length <= charsPerLine) {
              lines.push(remaining);
              remaining = '';
            } else if (lines.length === nameLineMax - 1) {
              lines.push(remaining.slice(0, charsPerLine - 1) + '…');
              remaining = '';
            } else {
              lines.push(remaining.slice(0, charsPerLine));
              remaining = remaining.slice(charsPerLine);
            }
          }

          let ty = sy + 2;
          for (const line of lines) {
            ctx.fillStyle = '#fff';
            ctx.fillText(line, sx + 3, ty);
            ty += lineH;
          }

          if (ty + lineH <= sy + rh + 2) {
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fillText(tok, sx + 3, ty);
          }
        }
      }

      ctx.restore();
    }
  }

  ctx.restore();
}

/* Icicle hit test */
function icicleHitTest(clientX, clientY) {
  if (!icicleHierarchy) return null;
  const rect = icPane.getBoundingClientRect();
  const mx = clientX - rect.left;
  const my = clientY - rect.top;

  const { nodes } = icicleHierarchy;
  const vy0 = viewport.y0, vy1 = viewport.y1;
  const vh = vy1 - vy0 || 1;
  const availH = icH - BREADCRUMB_H;

  for (let i = nodes.length - 1; i >= 0; i--) {
    const node = nodes[i];
    const sx = colX(node._depth);
    const cw = colWidth(node._depth);
    const sy = BREADCRUMB_H + ((node._x0 - vy0) / vh) * availH;
    const sh = ((node._x1 - node._x0) / vh) * availH;

    if (mx >= sx && mx <= sx + cw && my >= sy && my <= sy + sh) {
      if (node.type === 'removed_group' && colorScheme !== 'diff') continue;
      return node;
    }
  }
  return null;
}

/* ════════════════════════════════════════════════════
   BREADCRUMB — shows selected node path
   ════════════════════════════════════════════════════ */
const breadcrumbEl = document.getElementById('breadcrumb');
const parentMap = new Map();

function buildParentMap() {
  parentMap.clear();
  if (!icicleHierarchy) return;
  for (const node of icicleHierarchy.nodes) {
    if (node.children) {
      for (const c of node.children) parentMap.set(c, node);
    }
  }
}

function renderBreadcrumb() {
  if (!icicleSelected) {
    breadcrumbEl.innerHTML = '<span class="bc-current">scroll to zoom · drag to pan · click to select · dblclick to focus</span>';
    return;
  }

  const path = [];
  let cur = icicleSelected;
  while (cur) { path.unshift(cur); cur = parentMap.get(cur); }

  breadcrumbEl.innerHTML = path.map((node, i) => {
    if (i === path.length - 1) {
      return `<span class="bc-current">${escHtml(node.name || 'root')}</span>`;
    }
    return `<span class="bc-link" data-idx="${i}">${escHtml(node.name || 'root')}</span><span class="bc-sep"> › </span>`;
  }).join('');

  breadcrumbEl.querySelectorAll('.bc-link').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      zoomToNode(path[idx]);
    });
  });
}

function showTooltip(ev, node) {

  if (rootTokens > 0) {
    html += ` <span class="tt-pct">(${fmtPct(node.tokens, rootTokens)})</span>`;
  }
  html += '</div>';
  html += `<div class="tt-row">Type: <span class="tt-val">${node.type}</span></div>`;

  tooltipEl.innerHTML = html;
  tooltipEl.style.display = 'block';

function moveTooltip(ev) {
  const pad = 12;
  let left = ev.clientX + pad;
  let top = ev.clientY + pad;
  if (left + 340 > window.innerWidth) left = ev.clientX - 340 - pad;
  if (top + 160 > window.innerHeight) top = ev.clientY - 160;
  tooltipEl.style.left = left + 'px';
  tooltipEl.style.top = top + 'px';
}

/* ── JSON tree renderer ── */
function renderJsonTree(obj, indent) {
  indent = indent || 0;
  const pad = '  '.repeat(indent);
  const lines = [];

  if (obj === null || obj === undefined) {
    lines.push(`<span class="json-line">${pad}<span class="json-null">null</span></span>`);
  } else if (typeof obj === 'string') {
    const escaped = escHtml(obj);
    const display = escaped.length > 200 ? escaped.slice(0, 200) + '…' : escaped;
    const cls = obj.includes('\n') ? 'json-str json-multiline-str' : 'json-str';
    lines.push(`<span class="json-line">${pad}<span class="${cls}">"${display}"</span></span>`);
  } else if (typeof obj === 'number') {
    lines.push(`<span class="json-line">${pad}<span class="json-num">${obj}</span></span>`);
  } else if (typeof obj === 'boolean') {
    lines.push(`<span class="json-line">${pad}<span class="json-bool">${obj}</span></span>`);
  } else if (Array.isArray(obj)) {
    if (obj.length === 0) {
      lines.push(`<span class="json-line">${pad}<span class="json-bracket">[]</span></span>`);
    } else {
      const id = 'jt_' + Math.random().toString(36).slice(2, 9);
      lines.push(`<span class="json-line">${pad}<span class="json-toggle" data-target="${id}" data-state="open">▼</span><span class="json-bracket">[</span> <span class="json-collapsed-hint" id="${id}_hint" style="display:none">${obj.length} items…</span></span>`);
      lines.push(`<span id="${id}">`);
      for (let i = 0; i < obj.length; i++) {
        const childLines = renderJsonTree(obj[i], indent + 1);
        const suffix = i < obj.length - 1 ? ',' : '';
        lines.push(childLines + suffix);
      }
      lines.push(`</span>`);
      lines.push(`<span class="json-line">${pad}<span class="json-bracket">]</span></span>`);
    }
  } else if (typeof obj === 'object') {
    const keys = Object.keys(obj);
    if (keys.length === 0) {
      lines.push(`<span class="json-line">${pad}<span class="json-bracket">{}</span></span>`);
    } else {
      const id = 'jt_' + Math.random().toString(36).slice(2, 9);
      lines.push(`<span class="json-line">${pad}<span class="json-toggle" data-target="${id}" data-state="open">▼</span><span class="json-bracket">{</span> <span class="json-collapsed-hint" id="${id}_hint" style="display:none">${keys.length} keys…</span></span>`);
      lines.push(`<span id="${id}">`);
      for (let i = 0; i < keys.length; i++) {
        const k = keys[i];
        const innerPad = '  '.repeat(indent + 1);
        const valLines = renderJsonTree(obj[k], indent + 1);
        /* Replace leading pad of first line with key prefix */
        const firstLineContent = valLines.replace(new RegExp(`^<span class="json-line">${'  '.repeat(indent + 1)}`), `<span class="json-line">${innerPad}<span class="json-key">"${escHtml(k)}"</span>: `);
        const suffix = i < keys.length - 1 ? ',' : '';
        lines.push(firstLineContent + suffix);
      }
      lines.push(`</span>`);
      lines.push(`<span class="json-line">${pad}<span class="json-bracket">}</span></span>`);
    }
  }

  return lines.join('\n');
}

function buildNodeRawJson(node) {
  /* Reconstruct original content from the profiled tree.
     Leaf nodes have 'content' with the raw text/value.
     Branch nodes represent dicts/arrays — rebuild from children. */

  /* Leaf: return the raw content directly */
  if (!node.children || node.children.length === 0) {
    if (node.content != null && node.content !== '') {
      /* Try to parse as JSON to show structured data */
      try { return JSON.parse(node.content); } catch(e) {}
      return node.content;
    }
    return null;
  }

  /* Check if children look like array items (names are [0], [1], etc. or start with [) */
  const firstChild = node.children[0];
  const looksLikeArray = firstChild && /^\[\d+\]/.test(firstChild.name);

  if (looksLikeArray) {
    return node.children.map(c => buildNodeRawJson(c));
  }

  /* Otherwise reconstruct as object */
  const obj = {};
  for (const child of node.children) {
    obj[child.name] = buildNodeRawJson(child);
  }
  return obj;
}

function initJsonToggle(container) {
  container.addEventListener('click', (ev) => {
    const toggle = ev.target.closest('.json-toggle');
    if (!toggle) return;
    const targetId = toggle.dataset.target;
    const targetEl = document.getElementById(targetId);
    const hintEl = document.getElementById(targetId + '_hint');
    if (!targetEl) return;
    const isOpen = toggle.dataset.state === 'open';
    if (isOpen) {
      targetEl.style.display = 'none';
      if (hintEl) hintEl.style.display = 'inline';
      toggle.textContent = '▶';
      toggle.dataset.state = 'closed';
    } else {
      targetEl.style.display = '';
      if (hintEl) hintEl.style.display = 'none';
      toggle.textContent = '▼';
      toggle.dataset.state = 'open';
    }
  });
}

function showDetail(node) {
  if (!node) {
    detailPanel.classList.remove('open');
    detailPanel.style.height = '';
    detailResizeHandle.classList.remove('visible');
    detailLeft.innerHTML = '';
    detailRight.innerHTML = '';
    icicleSelected = null;
    renderBreadcrumb();
    requestRender();
    return;
  }
  icicleSelected = node;
  detailPanel.classList.add('open');
  detailResizeHandle.classList.add('visible');
  detailPanel.style.height = detailHeight + 'px';
  renderBreadcrumb();
  requestRender();

  const rootTokens = currentTree ? currentTree.tokens || currentTree._sumTokens : 0;

  /* Build path */
  const pathArr = [];
  let cur = node;
  while (cur) { pathArr.unshift(cur.name || 'root'); cur = parentMap.get(cur); }

  let tags = `<span class="detail-tag">${escHtml(node.type)}</span>`;
  if (node.role) tags += `<span class="detail-tag">${escHtml(node.role)}</span>`;
  if (node.tool_name) tags += `<span class="detail-tag">${escHtml(node.tool_name)}</span>`;

  /* Left panel: main info */
  detailLeft.innerHTML = `
    <div class="detail-cell"><div class="detail-label">Name</div><div class="detail-value">${escHtml(node.name)}</div></div>
    <div class="detail-cell"><div class="detail-label">Tokens</div><div class="detail-value">${fmtK(node.tokens)} ${rootTokens ? '<span style="color:#666">(' + fmtPct(node.tokens, rootTokens) + ')</span>' : ''}</div></div>
    <div class="detail-cell"><div class="detail-label">Tags</div><div class="detail-value">${tags}</div></div>
    <div class="detail-cell"><div class="detail-label">Path</div><div class="detail-value mono" style="color:#666;font-size:10px;">${escHtml(pathArr.join(' › '))}</div></div>
    ${node.children ? `<div class="detail-cell"><div class="detail-label">Children</div><div class="detail-value">${node.children.length}</div></div>` : ''}
  `;

  /* Right panel: raw JSON */
  const rawJson = buildNodeRawJson(node);
  detailRight.innerHTML = `<div class="json-tree">${renderJsonTree(rawJson, 0)}</div>`;
  initJsonToggle(detailRight);
}

function showRoundDiffDetail(requestIndex) {
  const diff = diffByRequest.get(requestIndex);
  if (!diff) return;
  const hints = hintsByRequest.get(requestIndex) || [];
  detailPanel.classList.add('open');
  detailResizeHandle.classList.add('visible');
  detailPanel.style.height = detailHeight + 'px';

  const hintTags = hints.length
    ? hints.map(h => `<span class="detail-tag">${escHtml(h.type)}</span>`).join('')
    : '<span class="detail-tag">no hint</span>';
  const topAdded = (diff.top_added || []).slice(0, 5);

  detailLeft.innerHTML = `
    <div class="detail-cell"><div class="detail-label">Request</div><div class="detail-value">#${diff.request_index}</div></div>
    <div class="detail-cell"><div class="detail-label">Delta</div><div class="detail-value">${fmtK(diff.delta_tokens)} tokens</div></div>
    <div class="detail-cell"><div class="detail-label">Added</div><div class="detail-value">${fmtK(diff.added_tokens)}</div></div>
    <div class="detail-cell"><div class="detail-label">Removed</div><div class="detail-value">${fmtK(diff.removed_tokens)}</div></div>
    <div class="detail-cell"><div class="detail-label">Retained</div><div class="detail-value">${fmtK(diff.retained_tokens)}</div></div>
    <div class="detail-cell"><div class="detail-label">Top Tool</div><div class="detail-value">${escHtml(diff.top_added_tool || 'none')}</div></div>
    <div class="detail-cell"><div class="detail-label">Top Artifact</div><div class="detail-value mono" style="color:#666;font-size:10px;">${escHtml(diff.top_added_artifact || 'none')}</div></div>
    <div class="detail-cell"><div class="detail-label">Hints</div><div class="detail-value">${hintTags}</div></div>
  `;

  detailRight.innerHTML = `
    <div class="json-tree">${renderJsonTree({
      added_by_kind: diff.added_by_kind,
      removed_by_kind: diff.removed_by_kind,
      top_added: topAdded,
      hints,
    }, 0)}</div>
  `;
  initJsonToggle(detailRight);
}

/* ════════════════════════════════════════════════════
   ROUND SWITCHING
   ════════════════════════════════════════════════════ */
function switchToRound(index) {
  if (index < 0 || index >= session_trees.length) return;
  const tree = session_trees[index];
  if (!tree) return;

  currentRound = tree.request_index;
  currentTree = tree;
  icicleHierarchy = buildHierarchy(tree);
  buildParentMap();
  computeColWidths();
  icicleHovered = null;
  icicleSelected = null;

  document.getElementById('call-badge').textContent = `Call #${currentRound}`;

  showDetail(null);
  fitViewport();
  renderTimeline();
  renderIcicle();
  renderBreadcrumb();
}

function switchToSnapshot() {
  currentTree = icicle;
  currentRound = -1;
  icicleHierarchy = buildHierarchy(icicle);
  buildParentMap();
  computeColWidths();
  icicleHovered = null;
  icicleSelected = null;

  document.getElementById('call-badge').textContent = 'snapshot';

  showDetail(null);
  fitViewport();
  renderTimeline();
  renderIcicle();
  renderBreadcrumb();
}

});

/* ── Icicle pan/zoom (speedscope style) ── */
let icDragging = false;
let icDragStartX = 0, icDragStartY = 0;
let icDragVP = null;
let icLastClickTime = 0;
let icLastClickNode = null;

icPane.addEventListener('mousedown', (ev) => {
  if (ev.button !== 0) return;
  icDragging = true;
  icDragStartX = ev.clientX;
  icDragStartY = ev.clientY;
  icDragVP = { ...viewport };
  icPane.style.cursor = 'grabbing';
});

document.addEventListener('mousemove', (ev) => {
  if (!icDragging) return;

  /* Pan in config space — Y axis only (token fraction) */
  const dy = ev.clientY - icDragStartY;
  const availH = icH - BREADCRUMB_H;
  const vh = icDragVP.y1 - icDragVP.y0;
  const cfgDy = -(dy / availH) * vh;

  viewport.y0 = icDragVP.y0 + cfgDy;
  viewport.y1 = icDragVP.y1 + cfgDy;
  clampViewport();
  requestRender();
});

document.addEventListener('mouseup', (ev) => {
  if (!icDragging) return;
  const dx = Math.abs(ev.clientX - icDragStartX);
  const dy = Math.abs(ev.clientY - icDragStartY);
  const wasDrag = dx > 3 || dy > 3;

  icDragging = false;
  icPane.style.cursor = '';

  if (!wasDrag) {
    /* It was a click, not a drag */
    const node = icicleHitTest(ev.clientX, ev.clientY);
    const now = Date.now();

    /* Double-click detection */
    if (node && node === icLastClickNode && (now - icLastClickTime) < 350) {
      /* Double-click: zoom to fit this node */
      zoomToNode(node);
      showDetail(node);
      icLastClickTime = 0;
      icLastClickNode = null;
    } else {
      /* Single click: select */
      icLastClickTime = now;
      icLastClickNode = node;
      showDetail(node);
    }
  }
});

/* Hover */
icPane.addEventListener('mousemove', (ev) => {
  if (icDragging) return;
  const node = icicleHitTest(ev.clientX, ev.clientY);
  if (node !== icicleHovered) {
    icicleHovered = node;
    requestRender();
  }
  showTooltip(ev, node);
  icPane.style.cursor = node ? 'pointer' : 'grab';
});

icPane.addEventListener('mouseleave', () => {
  if (icicleHovered) {
    icicleHovered = null;
    requestRender();
  }
  tooltipEl.style.display = 'none';
});

/* Wheel: pinch = zoom, two-finger scroll = pan */
icPane.addEventListener('wheel', (ev) => {
  ev.preventDefault();
  const rect = icPane.getBoundingClientRect();
  const my = ev.clientY - rect.top;

  if (ev.ctrlKey || ev.metaKey) {
    /* Pinch-to-zoom: zoom vertically around cursor */
    const zoomFactor = Math.pow(1.04, -ev.deltaY);
    const cfgY = screenToCfgY(my);
    const vh = viewport.y1 - viewport.y0;
    const newH = clamp(vh * zoomFactor, 0.0001, 1);
    const ratio = (cfgY - viewport.y0) / vh;
    viewport.y0 = cfgY - ratio * newH;
    viewport.y1 = cfgY + (1 - ratio) * newH;
  } else {
    /* Two-finger scroll: pan vertically */
    const vh = viewport.y1 - viewport.y0;
    const delta = (ev.deltaY / (icH - BREADCRUMB_H)) * vh;
    viewport.y0 += delta;
    viewport.y1 += delta;
  }
  clampViewport();
  requestRender();
}, { passive: false });

/* ── Keyboard ── */
document.addEventListener('keydown', (ev) => {
  /* Round navigation */
  if (ev.key === 'ArrowLeft' || ev.key === 'ArrowRight') {
    if (timeline.length < 2) return;
    ev.preventDefault();
    const currentIdx = timeline.findIndex(d => d.request_index === currentRound);
    const newIdx = ev.key === 'ArrowLeft'
      ? Math.max(0, currentIdx - 1)
      : Math.min(timeline.length - 1, currentIdx + 1);
    switchToRound(newIdx);
    return;
  }

  /* Zoom */
  if (ev.key === '=' || ev.key === '+') {
    const cy = (viewport.y0 + viewport.y1) / 2;
    const vh = viewport.y1 - viewport.y0;
    const newH = vh * 0.7;
    viewport.y0 = cy - newH / 2;
    viewport.y1 = cy + newH / 2;
    clampViewport();
    requestRender();
  }
  if (ev.key === '-') {
    const cy = (viewport.y0 + viewport.y1) / 2;
    const vh = viewport.y1 - viewport.y0;
    const newH = Math.min(2, vh * 1.4);
    viewport.y0 = cy - newH / 2;
    viewport.y1 = cy + newH / 2;
    clampViewport();
    requestRender();
  }

  /* Reset view */
  if (ev.key === '0') {
    fitViewport();
    requestRender();
  }

  if (ev.key === 'Escape') {
    showDetail(null);
  }

  /* W/S vertical pan */
  const panStep = 0.1;
  const vh = viewport.y1 - viewport.y0;
  if (ev.key === 'w') { viewport.y0 -= vh * panStep; viewport.y1 -= vh * panStep; clampViewport(); requestRender(); }
  if (ev.key === 's') { viewport.y0 += vh * panStep; viewport.y1 += vh * panStep; clampViewport(); requestRender(); }
});

const ROLE_CHIP_DEFS = [
  { type: 'msg_system', label: 'system', color: ROLE_COLORS.msg_system },
  { type: 'msg_user', label: 'user', color: ROLE_COLORS.msg_user },
  { type: 'msg_assistant', label: 'assistant', color: ROLE_COLORS.msg_assistant },
  { type: 'msg_tool', label: 'tool', color: ROLE_COLORS.msg_tool },

  { type: 'tool_defs', label: 'tool_defs', color: ROLE_COLORS.tool_defs },
];

const DIFF_CHIP_DEFS = [
  { diff: 'unchanged', label: 'unchanged', color: DIFF_COLORS.unchanged },
  { diff: 'added', label: 'added', color: DIFF_COLORS.added },
  { diff: 'removed', label: 'removed', color: DIFF_COLORS.removed },
  { diff: 'modified', label: 'modified', color: DIFF_COLORS.modified },
];

let diffFilter = null;  /* null = no filter, or 'unchanged' | 'added' | 'removed' | 'modified' */

function nodeMatchesDiffFilter(node) {
  if (!diffFilter) return true;
  if (node.diff === diffFilter) return true;
  if (node.children) {
    for (const c of node.children) {
      if (nodeMatchesDiffFilter(c)) return true;
    }
  }
  return false;
}

function buildFilterChips() {
  const filterBar = document.getElementById('role-filter-bar');
  /* Clear existing chips */
  filterBar.querySelectorAll('.role-chip').forEach(c => c.remove());
  roleFilter = null;
  diffFilter = null;

  if (colorScheme === 'diff') {
    DIFF_CHIP_DEFS.forEach(def => {
      const chip = document.createElement('span');
      chip.className = 'role-chip';
      chip.dataset.diff = def.diff;
      chip.innerHTML = `<span class="chip-dot" style="background:${def.color}"></span>${def.label}`;
      chip.style.background = 'rgba(255,255,255,0.06)';
      chip.addEventListener('click', () => {
        if (diffFilter === def.diff) {
          diffFilter = null;
          chip.classList.remove('active');
        } else {
          diffFilter = def.diff;
          filterBar.querySelectorAll('.role-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
        }
        renderIcicle();
      });
      filterBar.appendChild(chip);
    });
  } else {
    ROLE_CHIP_DEFS.forEach(def => {
      const chip = document.createElement('span');
      chip.className = 'role-chip';
      chip.dataset.type = def.type;
      chip.innerHTML = `<span class="chip-dot" style="background:${def.color}"></span>${def.label}`;
      chip.style.background = 'rgba(255,255,255,0.06)';

          roleFilter = null;
          chip.classList.remove('active');

          roleFilter = def.type;
          filterBar.querySelectorAll('.role-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
        }
        renderIcicle();
      });
      filterBar.appendChild(chip);
    });
  }
}
